<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>אירועי בת מצווה</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0 auto;
max-width:430px;
background:
radial-gradient(circle at top right, rgba(168,85,247,.22), transparent 35%),
radial-gradient(circle at bottom left, rgba(236,72,153,.18), transparent 35%),
#07070a;
font-family:sans-serif;
color:white;
overflow-x:hidden;
min-height:100vh;
}

.glass{
background:rgba(255,255,255,.07);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
}

.tab{
display:none;
}

.tab.active{
display:block;
}

.phoneCell{
width:34px;
height:48px;
border-radius:14px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
color:white;
text-align:center;
font-weight:900;
outline:none;
}

.phoneCell:focus{
border-color:#a855f7;
box-shadow:0 0 0 3px rgba(168,85,247,.18);
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:14px 22px;
border-radius:18px;
background:#111827;
color:white;
font-weight:700;
z-index:9999;
opacity:0;
pointer-events:none;
transition:.3s;
}

.toast.show{
opacity:1;
top:35px;
}

.loaderScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
backdrop-filter:blur(8px);
z-index:999;
display:none;
align-items:center;
justify-content:center;
}

.loader{
width:46px;
height:46px;
border-radius:999px;
border:4px solid rgba(255,255,255,.15);
border-top:4px solid white;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

.calendar-day{
min-height:90px;
}

</style>

</head>

<body>

<div id="toast"
class="toast"></div>

<div id="loaderScreen"
class="loaderScreen">

<div class="loader"></div>

</div>

<!-- LOGIN -->

<div id="loginScreen"
class="min-h-screen flex items-center justify-center p-4">

<div class="glass rounded-[34px] p-5 w-full max-w-sm">

<h1 class="text-2xl font-black text-center mb-6">
אירועי בת מצווה ✨
</h1>

<form id="loginForm"
class="space-y-4">

<div class="grid grid-cols-2 gap-3">

<button type="button"
class="roleBtn bg-purple-600 rounded-2xl p-3 font-bold"
data-role="אמא">

אמא 👩

</button>

<button type="button"
class="roleBtn bg-white/10 rounded-2xl p-3 font-bold"
data-role="אבא">

אבא 👨

</button>

</div>

<input id="parentName"
placeholder="שם ההורה"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none">

<input id="girlName"
placeholder="שם הילדה"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none">

<div>

<label class="block text-sm font-bold mb-2">
טלפון
</label>

<div class="flex items-center gap-2" dir="ltr">

<select id="phonePrefix"
class="h-12 px-2 rounded-2xl bg-white/10 border border-white/10 text-white outline-none">

<option>050</option>
<option>051</option>
<option>052</option>
<option>053</option>
<option>054</option>
<option>055</option>
<option>056</option>
<option>057</option>
<option>058</option>

</select>

<span class="text-white/40 font-black">-</span>

<div class="flex gap-1">

<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">

</div>

</div>

</div>

<button
class="w-full rounded-2xl p-3 font-black bg-gradient-to-r from-pink-500 to-purple-600">

כניסה לישומון

</button>

</form>

</div>

</div>

<!-- APP -->

<div id="appScreen"
class="hidden pb-28">

<header
class="sticky top-0 z-50 bg-black/40 backdrop-blur-xl border-b border-white/5">

<div class="p-4">

<div class="flex justify-between items-center">

<div>

<h2 id="headerName"
class="font-black text-lg"></h2>

<div id="headerSub"
class="text-sm text-purple-200 mt-1"></div>

</div>

<button id="logoutBtn"
class="text-red-300 text-sm">

התנתקות

</button>

</div>

</div>

</header>

<div id="upcomingBar"
class="mx-4 mt-4 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-4 text-sm font-bold">

טוען אירועים...

</div>

<!-- EVENTS -->

<div id="eventsTab"
class="tab active p-4 space-y-4"></div>

<!-- CALENDAR -->

<div id="calendarTab"
class="tab p-4"></div>

<!-- MESSAGES -->

<div id="messagesTab"
class="tab p-4 space-y-4">

<div class="glass rounded-[28px] p-4">

<textarea id="messageInput"
class="w-full bg-white/10 rounded-2xl p-4 outline-none min-h-[120px]"
placeholder="כתוב הודעה..."></textarea>

<button id="sendMessageBtn"
class="w-full mt-3 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 font-black">

שלח הודעה

</button>

</div>

<div id="messagesContainer"
class="space-y-3"></div>

</div>

</div>

<!-- ADD EVENT -->

<button id="addEventBtn"
class="hidden fixed bottom-24 left-6 z-50 w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-purple-600 shadow-2xl text-3xl font-black">

+

</button>

<!-- MODAL -->

<div id="eventModal"
class="hidden fixed inset-0 bg-black/70 z-50 items-center justify-center p-4">

<div class="glass rounded-[34px] p-5 w-full max-w-sm">

<div class="flex justify-between items-center mb-5">

<h3 class="font-black text-lg">
יצירת אירוע
</h3>

<button id="closeModalBtn">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

<form id="eventForm"
class="space-y-4">

<input type="date"
id="eventDate"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="time"
id="eventTime"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="text"
id="eventLocation"
placeholder="מקום האירוע"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="text"
id="eventAddress"
placeholder="כתובת"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<select id="eventMenu"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<option value="">בחר תפריט</option>
<option value="חלבי 🥛">חלבי 🥛</option>
<option value="בשרי 🥩">בשרי 🥩</option>

</select>

<input type="file"
id="eventImage"
accept="image/*">

<label class="flex items-center gap-3 text-sm">

<input type="checkbox"
id="hideAttendees">

הסתר אישורי הגעה

</label>

<button
class="w-full rounded-2xl p-3 font-black bg-gradient-to-r from-pink-500 to-purple-600">

פרסם אירוע 🚀

</button>

</form>

</div>

</div>

<!-- NAV -->

<nav
class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto h-20 bg-black/70 backdrop-blur-2xl border-t border-white/10 flex z-50">

<button onclick="switchTab('events')"
class="navBtn flex-1 flex flex-col items-center justify-center gap-1 text-pink-300">

<i class="fa-solid fa-list"></i>

<span class="text-[11px]">
אירועים
</span>

</button>

<button onclick="switchTab('calendar')"
class="navBtn flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

<i class="fa-solid fa-calendar-days"></i>

<span class="text-[11px]">
לוח שנה
</span>

</button>

<button onclick="switchTab('messages')"
class="navBtn flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

<i class="fa-solid fa-bell"></i>

<span class="text-[11px]">
הודעות
</span>

</button>

</nav>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyRNLuyH_sP-7GJIpvveZWvDdtIu5bj6nfNyVG1G3y7g7rT88SHOtqwyPhWKCBtWpA/exec";

// STATE

const state = {

currentUser:
JSON.parse(localStorage.getItem("bm_user")) || null,

events:[],
rsvps:[],
messages:[],

month:new Date().getMonth(),
year:new Date().getFullYear()

};

let selectedRole="אמא";

// DOM

const loginScreen =
document.getElementById("loginScreen");

const appScreen =
document.getElementById("appScreen");

const loaderScreen =
document.getElementById("loaderScreen");

// TOAST

function toast(text){

const el =
document.getElementById("toast");

el.innerText=text;

el.classList.add("show");

setTimeout(()=>{

el.classList.remove("show");

},2500);

}

// LOADER

function showLoader(){
loaderScreen.style.display="flex";
}

function hideLoader(){
loaderScreen.style.display="none";
}

// ROLE

document.querySelectorAll(".roleBtn")
.forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelectorAll(".roleBtn")
.forEach(b=>{

b.classList.remove("bg-purple-600");
b.classList.add("bg-white/10");

});

btn.classList.remove("bg-white/10");
btn.classList.add("bg-purple-600");

selectedRole =
btn.dataset.role;

});

});

// PHONE

document.querySelectorAll(".phoneCell")
.forEach((cell,index)=>{

cell.addEventListener("input",(e)=>{

e.target.value =
e.target.value.replace(/[^0-9]/g,'');

if(e.target.value.length===1){

const next =
document.querySelectorAll(".phoneCell")[index+1];

if(next){
next.focus();
}

}

});

});

// LOGIN

document.getElementById("loginForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const parentName =
document.getElementById("parentName")
.value.trim();

const girlName =
document.getElementById("girlName")
.value.trim();

if(!parentName || !girlName){

toast("יש למלא את כל השדות");

return;

}

let digits="";

document.querySelectorAll(".phoneCell")
.forEach(c=>{

digits += c.value;

});

let phone="";

if(digits.length===7){

phone =
document.getElementById("phonePrefix").value
+ "-"
+ digits;

}

state.currentUser={

id:crypto.randomUUID(),

parentName,

girlName,

role:selectedRole,

phone

};

localStorage.setItem(
"bm_user",
JSON.stringify(state.currentUser)
);

await init();

});

// INIT

async function init(){

loginScreen.classList.add("hidden");

appScreen.classList.remove("hidden");

renderHeader();

await fetchData();

}

// HEADER

function renderHeader(){

document.getElementById("headerName")
.innerText =
state.currentUser.parentName;

document.getElementById("headerSub")
.innerText =
`${state.currentUser.role} של ${state.currentUser.girlName}`;

}

// FETCH

async function fetchData(){

try{

showLoader();

const res =
await fetch(SCRIPT_URL);

const data =
await res.json();

state.events =
data.events || [];

state.rsvps =
data.rsvps || [];

state.messages =
data.messages || [];

renderUpcoming();
renderEvents();
renderCalendar();
renderMessages();
updateAddButton();

}catch(err){

console.error(err);

toast("שגיאה בטעינת נתונים");

}

hideLoader();

}

// API

async function api(action,payload={}){

const res =
await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify({
action,
...payload
})

});

return await res.json();

}

// UPCOMING

function formatDate(date,time){

const d =
new Date(`${date}T${time}`);

return new Intl.DateTimeFormat(
'he-IL',
{
day:'2-digit',
month:'2-digit',
year:'numeric',
hour:'2-digit',
minute:'2-digit'
}
).format(d);

}

function renderUpcoming(){

const upcoming =
state.events
.sort((a,b)=>
new Date(`${a.date}T${a.time}`) -
new Date(`${b.date}T${b.time}`)
)
.slice(0,2);

const bar =
document.getElementById("upcomingBar");

if(!upcoming.length){

bar.innerHTML=
"אין אירועים קרובים";

return;

}

bar.innerHTML=
upcoming.map(e=>`

<div class="mb-2">

🚨 ${e.girlName}
•
${formatDate(e.date,e.time)}

</div>

`).join("");

}

// ADD BTN

function updateAddButton(){

const exists =
state.events.find(
e=>e.ownerId===state.currentUser.id
);

const btn =
document.getElementById("addEventBtn");

if(exists){

btn.classList.add("hidden");

}else{

btn.classList.remove("hidden");

}

}

document.getElementById("addEventBtn")
.onclick=()=>{

eventModal.classList.remove("hidden");
eventModal.classList.add("flex");

};

document.getElementById("closeModalBtn")
.onclick=()=>{

eventModal.classList.add("hidden");
eventModal.classList.remove("flex");

};

// EVENT

document.getElementById("eventForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

showLoader();

let image="";

const file =
document.getElementById("eventImage")
.files[0];

if(file){

image =
await toBase64(file);

}

await api("createEvent",{

id:crypto.randomUUID(),

ownerId:
state.currentUser.id,

ownerName:
state.currentUser.parentName,

girlName:
state.currentUser.girlName,

date:
eventDate.value,

time:
eventTime.value,

location:
eventLocation.value,

address:
eventAddress.value,

menu:
eventMenu.value,

hideAttendees:
hideAttendees.checked,

image,

phone:
state.currentUser.phone,

role:
state.currentUser.role

});

eventModal.classList.add("hidden");
eventModal.classList.remove("flex");

toast("האירוע פורסם");

await fetchData();

hideLoader();

});

// EVENTS

function renderEvents(){

const container =
document.getElementById("eventsTab");

container.innerHTML="";

state.events.forEach(event=>{

const isMine =
event.ownerId===state.currentUser.id;

const eventRsvps =
state.rsvps.filter(
r=>r.eventId===event.id
);

const myVote =
eventRsvps.find(
r=>r.userId===state.currentUser.id
)?.status;

const yes =
eventRsvps.filter(
r=>r.status==="yes"
).length;

const maybe =
eventRsvps.filter(
r=>r.status==="maybe"
).length;

const no =
eventRsvps.filter(
r=>r.status==="no"
).length;

container.innerHTML += `

<div class="glass rounded-[34px] p-5">

<div class="flex gap-4">

<img src="${
event.image ||
'https://placehold.co/200'
}"
class="w-20 h-20 rounded-full object-cover border-4 border-white/10">

<div class="flex-1">

<h3 class="font-black text-lg">

בת מצווה ל${event.girlName} ✨

</h3>

<div class="text-white/50 text-sm mt-1">

${formatDate(event.date,event.time)}

</div>

<div class="mt-2 text-sm">
📍 ${event.location}
</div>

<div class="mt-1 text-xs text-white/60">
${event.address}
</div>

</div>

</div>

${
!isMine
?

`

<div class="grid grid-cols-3 gap-2 mt-5">

<button onclick="vote('${event.id}','yes')"
class="${
myVote==="yes"
?
'bg-green-500'
:
'bg-green-500/15 text-green-300'
}
rounded-2xl p-3 font-bold">

👍 מגיע

</button>

<button onclick="vote('${event.id}','maybe')"
class="${
myVote==="maybe"
?
'bg-yellow-500 text-black'
:
'bg-yellow-500/15 text-yellow-300'
}
rounded-2xl p-3 font-bold">

🤔 אולי

</button>

<button onclick="vote('${event.id}','no')"
class="${
myVote==="no"
?
'bg-red-500'
:
'bg-red-500/15 text-red-300'
}
rounded-2xl p-3 font-bold">

👎 לא

</button>

</div>

`

:

`

<div class="mt-4">

<button onclick="deleteEvent('${event.id}')"
class="bg-red-500/15 text-red-300 rounded-2xl px-4 py-2 text-sm font-bold">

מחק אירוע

</button>

</div>

`

}

<div class="mt-4 pt-4 border-t border-white/10">

${
event.hideAttendees === true ||
event.hideAttendees === "TRUE"
?

`

<div class="text-white/40 text-sm">

אישורי ההגעה מוסתרים 🔒

</div>

`

:

`

<div class="flex gap-4 text-sm flex-wrap">

<div class="text-green-300">
מגיעים: ${yes}
</div>

<div class="text-yellow-300">
אולי: ${maybe}
</div>

<div class="text-red-300">
לא מגיעים: ${no}
</div>

</div>

`

}

</div>

</div>

`;

});

}

// RSVP

async function vote(eventId,status){

showLoader();

await api("vote",{

eventId,

userId:
state.currentUser.id,

userName:
state.currentUser.parentName,

status

});

toast("אישור עודכן");

await fetchData();

hideLoader();

}

// DELETE

async function deleteEvent(eventId){

if(!confirm("למחוק אירוע?")){
return;
}

showLoader();

await api("deleteEvent",{
eventId
});

toast("האירוע נמחק");

await fetchData();

hideLoader();

}

// CALENDAR

function renderCalendar(){

const month =
state.month;

const year =
state.year;

const firstDay =
new Date(year,month,1).getDay();

const daysInMonth =
new Date(year,month+1,0).getDate();

let html=`

<div class="flex justify-between items-center mb-4">

<button onclick="changeMonth(-1)"
class="glass rounded-xl px-4 py-2">

<i class="fa-solid fa-chevron-right"></i>

</button>

<div class="font-black">

${new Intl.DateTimeFormat(
'he-IL',
{
month:'long',
year:'numeric'
}
).format(new Date(year,month))
}

</div>

<button onclick="changeMonth(1)"
class="glass rounded-xl px-4 py-2">

<i class="fa-solid fa-chevron-left"></i>

</button>

</div>

<div class="grid grid-cols-7 gap-2 text-center text-xs mb-2">

<div>א</div>
<div>ב</div>
<div>ג</div>
<div>ד</div>
<div>ה</div>
<div>ו</div>
<div>ש</div>

</div>

<div class="grid grid-cols-7 gap-2">

`;

for(let i=0;i<firstDay;i++){

html += `<div></div>`;

}

for(let day=1;day<=daysInMonth;day++){

const dateStr =
`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

const dayEvents =
state.events.filter(
e=>e.date===dateStr
);

html += `

<div class="calendar-day glass rounded-2xl p-2">

<div class="font-bold text-xs">

${day}

</div>

<div class="mt-2 flex flex-col gap-1">

${dayEvents.map(e=>`

<div class="bg-pink-500 rounded-lg px-1 py-[2px] text-[9px] truncate">

${e.girlName}

</div>

`).join("")}

</div>

</div>

`;

}

html += `</div>`;

document.getElementById("calendarTab")
.innerHTML=html;

}

function changeMonth(dir){

state.month += dir;

if(state.month < 0){

state.month=11;
state.year--;

}

if(state.month > 11){

state.month=0;
state.year++;

}

renderCalendar();

}

// MESSAGES

document.getElementById("sendMessageBtn")
.onclick=publishMessage;

async function publishMessage(){

const text =
document.getElementById("messageInput")
.value.trim();

if(!text){
return;
}

showLoader();

await api("createMessage",{

id:crypto.randomUUID(),

userName:
state.currentUser.parentName,

messageText:text

});

document.getElementById("messageInput")
.value="";

toast("ההודעה נשלחה");

await fetchData();

hideLoader();

}

function renderMessages(){

const container =
document.getElementById("messagesContainer");

container.innerHTML="";

[...state.messages]
.reverse()
.forEach(msg=>{

container.innerHTML += `

<div class="glass rounded-[28px] p-4">

<div class="flex justify-between items-center mb-2">

<div class="font-black">

${msg.userName}

</div>

<div class="text-xs text-white/40">

${new Date(msg.timestamp)
.toLocaleString("he-IL")}

</div>

</div>

<div class="text-sm leading-7">

${msg.messageText}

</div>

</div>

`;

});

}

// TABS

function switchTab(tab){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".navBtn")
.forEach(btn=>{

btn.classList.remove("text-pink-300");
btn.classList.add("text-white/40");

});

if(tab==="events"){

eventsTab.classList.add("active");

document.querySelectorAll(".navBtn")[0]
.classList.add("text-pink-300");

}

if(tab==="calendar"){

calendarTab.classList.add("active");

document.querySelectorAll(".navBtn")[1]
.classList.add("text-pink-300");

}

if(tab==="messages"){

messagesTab.classList.add("active");

document.querySelectorAll(".navBtn")[2]
.classList.add("text-pink-300");

}

}

// IMAGE

function toBase64(file){

return new Promise((resolve,reject)=>{

const reader =
new FileReader();

reader.readAsDataURL(file);

reader.onload=
()=>resolve(reader.result);

reader.onerror=
error=>reject(error);

});

}

// LOGOUT

document.getElementById("logoutBtn")
.onclick=()=>{

localStorage.removeItem("bm_user");

location.reload();

};

// AUTO INIT

if(state.currentUser){

(async()=>{

await init();

})();

}

</script>

</body>

</html>
