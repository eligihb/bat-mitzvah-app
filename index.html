<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ישומון אירועי בת מצווה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { max-width: 450px; margin: 0 auto; font-family: sans-serif; background-color: #f3f4f6; }
        .active-role { background-color: #8b5cf6 !important; color: white !important; border-color: #8b5cf6 !important; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="p-4">

    <header class="text-center mb-6">
        <div class="text-5xl mb-2">🎉</div>
        <h1 class="text-xl font-bold text-gray-800">ברוכים הבאים לישומון אירועי בת מצווה</h1>
        <h2 class="text-gray-500 text-sm">בית ספר כנפי רוח בנות - כיתה ו'4</h2>
    </header>

    <div id="app" class="bg-white p-6 rounded-2xl shadow-md space-y-5">
        
        <h3 class="font-bold text-gray-700">כניסה מהירה</h3>
        <div class="flex gap-3">
            <button id="btnMom" onclick="setRole('mom')" class="flex-1 py-3 border-2 rounded-xl font-bold transition">אמא</button>
            <button id="btnDad" onclick="setRole('dad')" class="flex-1 py-3 border-2 rounded-xl font-bold transition">אבא</button>
        </div>

        <input type="text" placeholder="שם מלא *" class="w-full p-3 border rounded-xl">
        
        <div class="flex gap-2 items-center">
            <input type="text" placeholder="שם הילדה *" class="flex-1 p-3 border rounded-xl">
            <span class="text-2xl cursor-pointer">✏️</span>
        </div>

        <div class="flex gap-2">
            <select class="w-1/3 p-3 border rounded-xl">
                <option>050</option><option>051</option><option>052</option><option>053</option>
                <option>054</option><option>055</option><option>058</option>
            </select>
            <input type="tel" placeholder="טלפון" class="flex-1 p-3 border rounded-xl">
        </div>

        <div class="border-t pt-5 space-y-4">
            <label class="block font-bold text-sm">תפריט הגשה *</label>
            <select id="menuSelect" onchange="handleMenuChange()" class="w-full p-3 border rounded-xl">
                <option value="dairy">חלבי</option>
                <option value="meat">בשרי</option>
                <option value="other">אחר</option>
            </select>
            <input id="otherMenuInput" type="text" placeholder="פרט תפריט אחר" class="hidden w-full p-3 border rounded-xl">

            <button onclick="toggleNotes()" class="text-purple-600 font-bold text-sm underline">הערות (אופציונלי)</button>
            <textarea id="notesArea" class="hidden w-full p-3 border rounded-xl" placeholder="ציין אם יש בריכה או פרטים נוספים..."></textarea>
        </div>

        <button onclick="alert('האירוע נשמר בהצלחה!')" class="w-full bg-purple-600 text-white py-4 rounded-xl font-bold text-lg">אישור</button>
        
        <button class="w-full text-gray-400 text-sm mt-4">התנתק מהמערכת</button>
    </div>

    <script>
        // לוגיקת בחירת אמא/אבא
        function setRole(role) {
            document.getElementById('btnMom').classList.toggle('active-role', role === 'mom');
            document.getElementById('btnDad').classList.toggle('active-role', role === 'dad');
        }

        // לוגיקת שדה "אחר"
        function handleMenuChange() {
            const menu = document.getElementById('menuSelect').value;
            const otherInput = document.getElementById('otherMenuInput');
            otherInput.classList.toggle('hidden', menu !== 'other');
        }

        // לוגיקת הערות
        function toggleNotes() {
            document.getElementById('notesArea').classList.toggle('hidden');
        }
    </script>
</body>
</html>
