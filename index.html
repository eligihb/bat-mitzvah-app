<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>ישומון אירועי בת מצווה</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            max-width: 430px;
            margin: 0 auto;
            overflow-x: hidden;
            background: #07070a;
            font-family: sans-serif;
            color: white;
        }

        .bg-main {
            background:
                radial-gradient(circle at top right, rgba(168, 85, 247, 0.25), transparent 35%),
                radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.18), transparent 35%),
                #07070a;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .glow {
            box-shadow:
                0 0 0 1px rgba(168, 85, 247, 0.25),
                0 10px 40px rgba(168, 85, 247, 0.2);
        }

        .twelve-bg {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 0;
        }

        .twelve-bg span {
            font-size: 320px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            text-shadow: 0 0 40px rgba(168, 85, 247, 0.15);
        }

        .phoneStyle {
            width: 40px;
            height: 54px;
            border-radius: 16px;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .08);
            text-align: center;
            font-weight: 900;
            color: white;
            outline: none;
        }

        .phoneStyle:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, .2);
        }

        .event-card {
            animation: fade .3s ease;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .activeBtn {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(0, 0, 0, .2);
        }
    </style>

</head>

<body class="bg-main">

    <!-- LOGIN -->

    <div id="loginScreen"
        class="min-h-screen flex items-center justify-center p-4 relative">

        <div class="twelve-bg">
            <span>12</span>
        </div>

        <div class="glass glow rounded-[34px] p-6 w-full max-w-sm relative z-10">

            <div class="text-center mb-8">

                <h1 class="text-2xl font-black mb-2">
                    ברוכים הבאים לישומון אירועי בת מצווה
                </h1>

                <div class="text-purple-200 text-sm">
                    כנפי רוח ו׳-4 • תשפ״ו
                </div>

            </div>

            <form id="loginForm" class="space-y-4">

                <!-- ROLE -->

                <div class="grid grid-cols-2 gap-3">

                    <button type="button"
                        class="roleBtn bg-purple-600 text-white rounded-2xl p-3 font-bold"
                        data-role="אמא">

                        אמא 👩

                    </button>

                    <button type="button"
                        class="roleBtn bg-white/10 text-white rounded-2xl p-3 font-bold"
                        data-role="אבא">

                        אבא 👨

                    </button>

                </div>

                <!-- PARENT -->

                <div>

                    <label class="text-sm font-bold mb-1 block">
                        שם ההורה *
                    </label>

                    <input id="parentName"
                        class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none"
                        placeholder="שם מלא">

                </div>

                <!-- GIRL -->

                <div>

                    <label class="text-sm font-bold mb-1 block">
                        שם הילדה *
                    </label>

                    <input id="girlName"
                        class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none"
                        placeholder="שם פרטי">

                </div>

                <!-- TWIN -->

                <div>

                    <button type="button"
                        id="toggleTwin"
                        class="text-sm text-purple-300 font-bold">

                        + תאומה נוספת

                    </button>

                    <input id="twinName"
                        class="hidden w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none mt-3"
                        placeholder="שם התאומה">

                </div>

                <!-- PHONE -->

                <div>

                    <label class="text-sm font-bold mb-1 block">
                        טלפון
                        <span class="text-gray-400 text-xs">(לא חובה)</span>
                    </label>

                    <div class="flex items-center gap-2" dir="ltr">

                        <select id="phonePrefix"
                            class="h-14 px-3 rounded-2xl bg-white/10 border border-white/10 text-white outline-none">

                            <option value="051">051</option>
                            <option value="052">052</option>
                            <option value="053">053</option>
                            <option value="054">054</option>
                            <option value="055">055</option>
                            <option value="056">056</option>
                            <option value="057">057</option>
                            <option value="058">058</option>
                            <option value="059">059</option>

                        </select>

                        <span class="text-white/40 font-black">-</span>

                        <div class="flex gap-1">

                            <input maxlength="1" class="phoneCell phoneStyle">
                            <input maxlength="1" class="phoneCell phoneStyle">
                            <input maxlength="1" class="phoneCell phoneStyle">
                            <input maxlength="1" class="phoneCell phoneStyle">
                            <input maxlength="1" class="phoneCell phoneStyle">
                            <input maxlength="1" class="phoneCell phoneStyle">
                            <input maxlength="1" class="phoneCell phoneStyle">

                        </div>

                    </div>

                </div>

                <button
                    class="w-full bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-3 font-black shadow-xl">

                    כניסה לישומון

                </button>

            </form>

        </div>

    </div>

    <!-- APP -->

    <div id="appScreen" class="hidden pb-28">

        <!-- HEADER -->

        <header
            class="sticky top-0 z-50 bg-black/40 backdrop-blur-xl border-b border-white/5">

            <div class="p-4">

                <div class="flex justify-between items-start">

                    <div>

                        <div class="flex items-center gap-2 flex-wrap">

                            <h2 id="headerName"
                                class="font-black text-lg"></h2>

                            <button id="callBtn"
                                class="w-8 h-8 rounded-full bg-white/10 text-white/40 flex items-center justify-center">

                                <i class="fa-solid fa-phone"></i>

                            </button>

                            <button id="waBtn"
                                class="w-8 h-8 rounded-full bg-white/10 text-white/40 flex items-center justify-center">

                                <i class="fa-brands fa-whatsapp"></i>

                            </button>

                            <button id="logoutBtn"
                                class="text-xs text-red-300">
                                התנתקות
                            </button>

                        </div>

                        <div class="flex items-center gap-2 mt-1">

                            <div id="headerRole"
                                class="text-sm text-purple-200"></div>

                            <button id="switchRoleBtn"
                                class="text-white/50 text-xs">

                                <i class="fa-solid fa-pen"></i>

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </header>

        <!-- UPCOMING -->

        <div id="upcomingBar"
            class="mx-4 mt-4 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 text-sm font-bold shadow-xl">

        </div>

        <!-- EVENTS -->

        <div id="eventsContainer"
            class="p-4 space-y-4"></div>

    </div>

    <!-- ADD BUTTON -->

    <button id="addBtn"
        class="hidden fixed bottom-24 left-6 z-50 w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-purple-600 shadow-2xl text-3xl font-black">

        +

    </button>

    <!-- ADD MODAL -->

    <div id="eventModal"
        class="hidden fixed inset-0 bg-black/70 z-50 items-center justify-center p-4">

        <div class="glass rounded-[34px] p-5 w-full max-w-sm">

            <div class="flex justify-between items-center mb-5">

                <h3 class="font-black text-lg">
                    הוספת אירוע
                </h3>

                <button id="closeModal">
                    <i class="fa-solid fa-xmark"></i>
                </button>

            </div>

            <form id="eventForm" class="space-y-4">

                <input type="date"
                    id="eventDate"
                    class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

                <input type="time"
                    id="eventTime"
                    class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

                <input type="text"
                    id="eventLocation"
                    placeholder="מקום האירוע"
                    class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

                <input type="text"
                    id="eventAddress"
                    placeholder="כתובת"
                    class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

                <select id="eventMenu"
                    class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

                    <option value="">בחר תפריט</option>
                    <option value="חלבי 🥛">חלבי 🥛</option>
                    <option value="בשרי 🥩">בשרי 🥩</option>

                </select>

                <input type="file"
                    id="girlImage"
                    accept="image/*">

                <div id="shabbatWarning"
                    class="hidden text-red-300 bg-red-500/10 border border-red-500/30 rounded-2xl p-3 text-sm">

                    לא ניתן לקבוע אירוע בזמן שבת ✨

                </div>

                <button
                    class="w-full bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-3 font-black">

                    פרסום אירוע 🚀

                </button>

            </form>

        </div>

    </div>

    <!-- NAV -->

    <nav
        class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto h-20 bg-black/70 backdrop-blur-2xl border-t border-white/10 flex z-50">

        <button class="flex-1 flex flex-col items-center justify-center gap-1 text-pink-300">

            <i class="fa-solid fa-list"></i>

            <span class="text-[11px]">
                אירועים
            </span>

        </button>

        <button class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

            <i class="fa-solid fa-calendar-days"></i>

            <span class="text-[11px]">
                לוח שנה
            </span>

        </button>

        <button class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

            <i class="fa-solid fa-bell"></i>

            <span class="text-[11px]">
                הודעות
            </span>

        </button>

        <button id="navAdd"
            class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

            <i class="fa-solid fa-plus"></i>

            <span class="text-[11px]">
                הוסף
            </span>

        </button>

    </nav>

    <script>

        // =====================
        // DATA
        // =====================

        let currentUser =
            JSON.parse(localStorage.getItem("bm_user")) || null;

        let events =
            JSON.parse(localStorage.getItem("bm_events")) || [];

        let selectedRole = "אמא";

        // =====================
        // PHONE INPUTS
        // =====================

        document.querySelectorAll(".phoneCell").forEach((cell, index) => {

            cell.addEventListener("input", (e) => {

                e.target.value =
                    e.target.value.replace(/[^0-9]/g, '');

                if (e.target.value.length === 1) {

                    const next =
                        document.querySelectorAll(".phoneCell")[index + 1];

                    if (next) next.focus();

                }

            });

            cell.addEventListener("keydown", (e) => {

                if (e.key === "Backspace" && !cell.value) {

                    const prev =
                        document.querySelectorAll(".phoneCell")[index - 1];

                    if (prev) prev.focus();

                }

            });

        });

        // =====================
        // ROLE
        // =====================

        document.querySelectorAll(".roleBtn").forEach(btn => {

            btn.onclick = () => {

                document.querySelectorAll(".roleBtn").forEach(b => {

                    b.classList.remove("bg-purple-600");

                    b.classList.add("bg-white/10");

                });

                btn.classList.remove("bg-white/10");

                btn.classList.add("bg-purple-600");

                selectedRole = btn.dataset.role;

            };

        });

        // =====================
        // TWIN
        // =====================

        document.getElementById("toggleTwin").onclick = () => {

            document.getElementById("twinName")
                .classList.toggle("hidden");

        };

        // =====================
        // LOGIN
        // =====================

        document.getElementById("loginForm").onsubmit = (e) => {

            e.preventDefault();

            const parentName =
                document.getElementById("parentName").value.trim();

            const girlName =
                document.getElementById("girlName").value.trim();

            if (!parentName || !girlName) {

                alert("יש למלא את כל שדות החובה");

                return;

            }

            let phoneDigits = "";

            document.querySelectorAll(".phoneCell").forEach(c => {

                phoneDigits += c.value;

            });

            let phone = "";

            if (phoneDigits.length === 7) {

                phone =
                    document.getElementById("phonePrefix").value +
                    "-" +
                    phoneDigits;

            }

            currentUser = {

                id: crypto.randomUUID(),

                role: selectedRole,

                parentName,

                girlName,

                twinName:
                    document.getElementById("twinName").value.trim(),

                phone

            };

            localStorage.setItem(
                "bm_user",
                JSON.stringify(currentUser)
            );

            init();

        };

        // =====================
        // INIT
        // =====================

        function init() {

            document.getElementById("loginScreen")
                .classList.add("hidden");

            document.getElementById("appScreen")
                .classList.remove("hidden");

            renderHeader();

            renderEvents();

            renderUpcoming();

            updateAddButton();

        }

        if (currentUser) {

            init();

        }

        // =====================
        // HEADER
        // =====================

        function renderHeader() {

            headerName.innerText =
                currentUser.parentName;

            headerRole.innerText =
                `${currentUser.role} של ${currentUser.girlName}`;

            if (currentUser.phone) {

                callBtn.classList.remove("text-white/40");
                waBtn.classList.remove("text-white/40");

                callBtn.onclick = () => {

                    location.href = `tel:${currentUser.phone}`;

                };

                waBtn.onclick = () => {

                    const clean =
                        currentUser.phone.replace("-", "");

                    window.open(
                        `https://wa.me/972${clean.substring(1)}`,
                        "_blank"
                    );

                };

            }

        }

        // =====================
        // LOGOUT
        // =====================

        logoutBtn.onclick = () => {

            localStorage.removeItem("bm_user");

            location.reload();

        };

        // =====================
        // SWITCH ROLE
        // =====================

        switchRoleBtn.onclick = () => {

            currentUser.role =
                currentUser.role === "אמא"
                    ? "אבא"
                    : "אמא";

            localStorage.setItem(
                "bm_user",
                JSON.stringify(currentUser)
            );

            renderHeader();

        };

        // =====================
        // UPCOMING
        // =====================

        function renderUpcoming() {

            const now = new Date();

            const upcoming =
                events.find(e =>
                    new Date(`${e.date}T${e.time}`) >= now
                );

            if (!upcoming) {

                upcomingBar.innerHTML =
                    "אין אירועים קרובים השבוע";

                return;

            }

            upcomingBar.innerHTML =
                `🚨 האירוע הקרוב: בת מצווה ל${upcoming.girlName} • ${upcoming.date} • ${upcoming.time}`;

        }

        // =====================
        // ADD BUTTON
        // =====================

        function updateAddButton() {

            const exists =
                events.find(e =>
                    e.girlName === currentUser.girlName
                );

            if (!exists) {

                addBtn.classList.remove("hidden");

            }

        }

        // =====================
        // OPEN MODAL
        // =====================

        addBtn.onclick = () => {

            eventModal.classList.remove("hidden");

            eventModal.classList.add("flex");

        };

        navAdd.onclick = addBtn.onclick;

        closeModal.onclick = () => {

            eventModal.classList.add("hidden");

            eventModal.classList.remove("flex");

        };

        // =====================
        // SHABBAT
        // =====================

        function isShabbat(date, time) {

            const d =
                new Date(`${date}T${time}`);

            const day = d.getDay();

            const hour = d.getHours();

            if (day === 5 && hour >= 17) return true;

            if (day === 6 && hour < 19) return true;

            return false;

        }

        // =====================
        // CREATE EVENT
        // =====================

        eventForm.onsubmit = async (e) => {

            e.preventDefault();

            const date = eventDate.value;
            const time = eventTime.value;
            const location = eventLocation.value.trim();
            const address = eventAddress.value.trim();
            const menu = eventMenu.value;

            if (!date || !time || !location || !address || !menu) {

                alert("יש למלא את כל השדות");

                return;

            }

            if (isShabbat(date, time)) {

                shabbatWarning.classList.remove("hidden");

                return;

            }

            const exists =
                events.find(e =>
                    e.girlName === currentUser.girlName
                );

            if (exists) {

                alert("האירוע של בתכם כבר פורסם בלוח האירועים ✨");

                return;

            }

            let image = "";

            const file = girlImage.files[0];

            if (file) {

                image = await toBase64(file);

            }

            events.push({

                id: crypto.randomUUID(),

                ownerId: currentUser.id,

                girlName: currentUser.girlName,

                date,
                time,
                location,
                address,
                menu,
                image,

                hideGuests: false,

                rsvp: {}

            });

            localStorage.setItem(
                "bm_events",
                JSON.stringify(events)
            );

            renderEvents();

            renderUpcoming();

            updateAddButton();

            eventModal.classList.add("hidden");

            eventModal.classList.remove("flex");

            eventForm.reset();

        };

        // =====================
        // RENDER EVENTS
        // =====================

        function renderEvents() {

            eventsContainer.innerHTML = "";

            if (!events.length) {

                eventsContainer.innerHTML =
                    `<div class="text-center text-white/40 py-20">
                        עדיין אין אירועים
                    </div>`;

                return;

            }

            events.forEach(event => {

                const isMine =
                    event.ownerId === currentUser.id;

                const myVote =
                    event.rsvp[currentUser.id];

                const yes =
                    Object.values(event.rsvp)
                        .filter(v => v === "yes").length;

                const maybe =
                    Object.values(event.rsvp)
                        .filter(v => v === "maybe").length;

                const no =
                    Object.values(event.rsvp)
                        .filter(v => v === "no").length;

                const card =
                    document.createElement("div");

                card.className =
                    "event-card glass rounded-[32px] p-5 mx-4";

                card.innerHTML = `

                    <div class="flex gap-4">

                        <img src="${event.image || 'https://placehold.co/200'}"
                            class="w-20 h-20 rounded-full object-cover border-4 border-white/10">

                        <div class="flex-1">

                            <div class="flex justify-between items-start">

                                <div>

                                    <h3 class="font-black text-lg">
                                        בת מצווה ל${event.girlName} ✨
                                    </h3>

                                    <div class="text-white/50 text-sm mt-1">
                                        ${event.date} • ${event.time}
                                    </div>

                                </div>

                                <div class="bg-white/10 px-3 py-1 rounded-full text-xs">
                                    ${event.menu}
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="bg-white/5 rounded-2xl p-4 mt-4 text-sm space-y-2">

                        <div>📍 ${event.location}</div>

                        <div>🗺️ ${event.address}</div>

                    </div>

                    ${!isMine ? `
                    
                    <div class="grid grid-cols-3 gap-2 mt-4">

                        <button onclick="vote('${event.id}','yes')"
                            class="${myVote === 'yes'
                                ? 'bg-green-500 activeBtn'
                                : 'bg-green-500/15 text-green-300'}
                            rounded-2xl p-3 font-bold">

                            מגיע 👍

                        </button>

                        <button onclick="vote('${event.id}','maybe')"
                            class="${myVote === 'maybe'
                                ? 'bg-yellow-500 text-black activeBtn'
                                : 'bg-yellow-500/15 text-yellow-300'}
                            rounded-2xl p-3 font-bold">

                            אולי 🤔

                        </button>

                        <button onclick="vote('${event.id}','no')"
                            class="${myVote === 'no'
                                ? 'bg-red-500 activeBtn'
                                : 'bg-red-500/15 text-red-300'}
                            rounded-2xl p-3 font-bold">

                            לא מגיע 👎

                        </button>

                    </div>

                    ${myVote ? `
                    
                    <button onclick="editVote('${event.id}')"
                        class="text-xs text-purple-300 mt-2">
                        עריכה
                    </button>

                    ` : ''}
                    
                    ` : ''}

                    <div class="mt-4 pt-4 border-t border-white/10">

                        ${event.hideGuests
                            ? `
                            
                            <div class="text-white/40 text-sm">
                                רשימת המשתתפים מוסתרת 🔒
                            </div>
                            
                            `
                            :
                            `
                            
                            <div class="flex gap-4 text-sm flex-wrap">

                                <div class="text-green-300">
                                    מגיעים: ${yes}
                                </div>

                                <div class="text-yellow-300">
                                    אולי: ${maybe}
                                </div>

                                <div class="text-red-300">
                                    לא מגיעים: ${no}
                                </div>

                            </div>
                            
                            `
                        }

                    </div>

                    ${isMine ? `
                    
                    <div class="flex gap-2 mt-4">

                        <button onclick="togglePrivacy('${event.id}')"
                            class="bg-white/10 rounded-2xl px-4 py-3 text-sm flex items-center gap-2">

                            <i class="fa-solid fa-eye-slash"></i>

                            ${event.hideGuests
                                ? 'הסתרה פעילה'
                                : 'הסתר'}

                        </button>

                        <button onclick="deleteEvent('${event.id}')"
                            class="bg-red-500/20 text-red-300 rounded-2xl px-4">

                            מחק

                        </button>

                    </div>
                    
                    ` : ''}

                `;

                eventsContainer.appendChild(card);

            });

        }

        // =====================
        // RSVP
        // =====================

        function vote(id, status) {

            const event =
                events.find(e => e.id === id);

            event.rsvp[currentUser.id] = status;

            localStorage.setItem(
                "bm_events",
                JSON.stringify(events)
            );

            renderEvents();

        }

        function editVote(id) {

            const event =
                events.find(e => e.id === id);

            delete event.rsvp[currentUser.id];

            localStorage.setItem(
                "bm_events",
                JSON.stringify(events)
            );

            renderEvents();

        }

        // =====================
        // PRIVACY
        // =====================

        function togglePrivacy(id) {

            const event =
                events.find(e => e.id === id);

            event.hideGuests =
                !event.hideGuests;

            localStorage.setItem(
                "bm_events",
                JSON.stringify(events)
            );

            renderEvents();

        }

        // =====================
        // DELETE
        // =====================

        function deleteEvent(id) {

            const ok =
                confirm("למחוק את האירוע?");

            if (!ok) return;

            events =
                events.filter(e => e.id !== id);

            localStorage.setItem(
                "bm_events",
                JSON.stringify(events)
            );

            renderEvents();

            updateAddButton();

        }

        // =====================
        // IMAGE
        // =====================

        function toBase64(file) {

            return new Promise((resolve, reject) => {

                const reader =
                    new FileReader();

                reader.readAsDataURL(file);

                reader.onload =
                    () => resolve(reader.result);

                reader.onerror =
                    error => reject(error);

            });

        }

    </script>

</body>
