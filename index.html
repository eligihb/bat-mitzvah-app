<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

<title>ישומון אירועי בת מצווה</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0 auto;
max-width:430px;
background:
radial-gradient(circle at top right, rgba(168,85,247,.22), transparent 35%),
radial-gradient(circle at bottom left, rgba(236,72,153,.18), transparent 35%),
#07070a;
font-family:sans-serif;
color:white;
overflow-x:hidden;
}

.glass{
background:rgba(255,255,255,.07);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.06);
}

.login-bg{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.login-bg::before{
content:"12";
position:absolute;
top:48%;
left:50%;
transform:translate(-50%,-50%) rotate(-8deg);

font-size:430px;
font-weight:900;

background:
linear-gradient(
180deg,
rgba(255,255,255,.14),
rgba(168,85,247,.22),
rgba(236,72,153,.16)
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

opacity:.22;

text-shadow:
0 0 40px rgba(168,85,247,.18),
0 0 90px rgba(236,72,153,.08);
}

.phoneCell{
width:34px;
height:48px;
border-radius:14px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
color:white;
text-align:center;
font-weight:900;
outline:none;
}

.phoneCell:focus{
border-color:#a855f7;
box-shadow:0 0 0 3px rgba(168,85,247,.18);
}

.event-card{
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.active-rsvp{
transform:scale(1.03);
box-shadow:0 0 18px rgba(0,0,0,.25);
}

.tab{
display:none;
}

.tab.active{
display:block;
}

.calendar-day{
min-height:88px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginScreen"
class="min-h-screen flex items-start justify-center pt-10 pb-4 px-4 relative">

<div class="login-bg"></div>

<div class="glass rounded-[34px] p-5 w-full max-w-sm relative z-10">

<div class="text-center mb-6">

<h1 class="text-2xl font-black mb-2 leading-tight">
ברוכים הבאים לישומון אירועי בת מצווה
</h1>

<div class="text-purple-200 text-sm">
כנפי רוח ו׳-4 • תשפ״ו
</div>

</div>

<form id="loginForm" class="space-y-3">

<div class="grid grid-cols-2 gap-3">

<button type="button"
class="roleBtn bg-purple-600 rounded-2xl p-3 font-bold"
data-role="אמא">

אמא 👩

</button>

<button type="button"
class="roleBtn bg-white/10 rounded-2xl p-3 font-bold"
data-role="אבא">

אבא 👨

</button>

</div>

<div>

<label class="block text-sm font-bold mb-1">
שם ההורה *
</label>

<input id="parentName"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none"
placeholder="שם מלא">

</div>

<div>

<label class="block text-sm font-bold mb-1">
שם הילדה *
</label>

<input id="girlName"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none"
placeholder="שם פרטי">

</div>

<div>

<button type="button"
id="toggleTwin"
class="text-sm text-purple-300 font-bold">

+ תאומה נוספת

</button>

<input id="twinName"
class="hidden w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none mt-3"
placeholder="שם התאומה">

</div>

<div>

<label class="block text-sm font-bold mb-1">
טלפון
<span class="text-gray-400 text-xs">
(לא חובה)
</span>
</label>

<div class="flex items-center gap-2" dir="ltr">

<select id="phonePrefix"
class="h-12 px-2 rounded-2xl bg-white/10 border border-white/10 text-white outline-none">

<option>051</option>
<option>052</option>
<option>053</option>
<option>054</option>
<option>055</option>
<option>056</option>
<option>057</option>
<option>058</option>
<option>059</option>

</select>

<span class="text-white/40 font-black">-</span>

<div class="flex gap-1">

<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">
<input maxlength="1" class="phoneCell">

</div>

</div>

</div>

<button
class="w-full bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-3 font-black shadow-xl">

כניסה לישומון

</button>

</form>

</div>

</div>

<!-- APP -->

<div id="appScreen" class="hidden pb-28">

<header
class="sticky top-0 z-50 bg-black/40 backdrop-blur-xl border-b border-white/5">

<div class="p-4">

<div class="flex justify-between items-start">

<div>

<div class="flex items-center gap-2 flex-wrap">

<h2 id="headerName"
class="font-black text-lg"></h2>

<button id="callBtn"
class="w-8 h-8 rounded-full bg-white/10 text-white/40 flex items-center justify-center">

<i class="fa-solid fa-phone"></i>

</button>

<button id="waBtn"
class="w-8 h-8 rounded-full bg-white/10 text-white/40 flex items-center justify-center">

<i class="fa-brands fa-whatsapp"></i>

</button>

<button id="logoutBtn"
class="text-xs text-red-300">

התנתקות

</button>

</div>

<div class="flex items-center gap-2 mt-1">

<div id="headerRole"
class="text-sm text-purple-200"></div>

<button id="switchRoleBtn"
class="text-xs text-white/50">

<i class="fa-solid fa-pen"></i>

</button>

</div>

</div>

</div>

</div>

</header>

<!-- UPCOMING -->

<div id="upcomingBar"
class="mx-4 mt-4 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 text-sm font-bold shadow-xl">

</div>

<!-- EVENTS -->

<div id="eventsTab"
class="tab active p-4 space-y-4"></div>

<!-- CALENDAR -->

<div id="calendarTab"
class="tab p-4"></div>

<!-- MESSAGES -->

<div id="messagesTab"
class="tab p-4 space-y-4">

<div class="glass rounded-[28px] p-4">

<textarea id="messageInput"
class="w-full bg-white/10 rounded-2xl p-4 outline-none min-h-[120px]"
placeholder="כתוב הודעה לכל ההורים..."></textarea>

<button onclick="publishMessage()"
class="w-full mt-3 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 font-black">

פרסם הודעה

</button>

</div>

<div id="messagesContainer"
class="space-y-3"></div>

</div>

</div>

<!-- ADD BTN -->

<button id="addBtn"
class="hidden fixed bottom-24 left-6 z-50 w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-purple-600 shadow-2xl text-3xl font-black">

+

</button>

<!-- MODAL -->

<div id="eventModal"
class="hidden fixed inset-0 bg-black/70 z-50 items-center justify-center p-4">

<div class="glass rounded-[34px] p-5 w-full max-w-sm">

<div class="flex justify-between items-center mb-5">

<h3 class="font-black text-lg">
הוספת אירוע
</h3>

<button id="closeModal">

<i class="fa-solid fa-xmark"></i>

</button>

</div>

<form id="eventForm" class="space-y-4">

<input type="date"
id="eventDate"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="time"
id="eventTime"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="text"
id="eventLocation"
placeholder="מקום האירוע"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="text"
id="eventAddress"
placeholder="כתובת"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<select id="eventMenu"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<option value="">בחר תפריט</option>
<option value="חלבי 🥛">חלבי 🥛</option>
<option value="בשרי 🥩">בשרי 🥩</option>

</select>

<input type="file"
id="girlImage"
accept="image/*">

<div class="flex items-center gap-3">

<button type="button"
id="privacyBtn"
class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center">

<i class="fa-solid fa-eye-slash"></i>

</button>

<div id="privacyText"
class="hidden text-xs text-white/60 leading-5">

המשתמשים לא יוכלו לראות
את אישורי ההגעה של האחרים

</div>

</div>

<div id="shabbatWarning"
class="hidden text-red-300 bg-red-500/10 border border-red-500/30 rounded-2xl p-3 text-sm">

לא ניתן לקבוע אירוע בזמן שבת ✨

</div>

<button
class="w-full bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-3 font-black">

פרסום אירוע 🚀

</button>

</form>

</div>

</div>

<!-- NAV -->

<nav id="bottomNav"
class="hidden fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto h-20 bg-black/70 backdrop-blur-2xl border-t border-white/10 flex z-50">

<button onclick="switchTab('events')"
class="flex-1 flex flex-col items-center justify-center gap-1 text-pink-300">

<i class="fa-solid fa-list"></i>

<span class="text-[11px]">
אירועים
</span>

</button>

<button onclick="switchTab('calendar')"
class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

<i class="fa-solid fa-calendar-days"></i>

<span class="text-[11px]">
לוח שנה
</span>

</button>

<button onclick="switchTab('messages')"
class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

<i class="fa-solid fa-bell"></i>

<span class="text-[11px]">
הודעות
</span>

</button>

<button id="navAdd"
class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">

<i class="fa-solid fa-plus"></i>

<span class="text-[11px]">
הוסף אירוע
</span>

</button>

</nav>

<script>

// DATA

let currentUser=
JSON.parse(localStorage.getItem("bm_user")) || null;

let events=
JSON.parse(localStorage.getItem("bm_events")) || [];

let messages=
JSON.parse(localStorage.getItem("bm_messages")) || [];

let selectedRole="אמא";

let hideGuests=false;

// PHONE

document.querySelectorAll(".phoneCell").forEach((cell,index)=>{

cell.addEventListener("input",(e)=>{

e.target.value=
e.target.value.replace(/[^0-9]/g,'');

if(e.target.value.length===1){

const next=
document.querySelectorAll(".phoneCell")[index+1];

if(next) next.focus();

}

});

});

// ROLE

document.querySelectorAll(".roleBtn").forEach(btn=>{

btn.onclick=()=>{

document.querySelectorAll(".roleBtn").forEach(b=>{

b.classList.remove("bg-purple-600");
b.classList.add("bg-white/10");

});

btn.classList.remove("bg-white/10");
btn.classList.add("bg-purple-600");

selectedRole=btn.dataset.role;

};

});

// LOGIN

loginForm.onsubmit=(e)=>{

e.preventDefault();

const parentName=
parentNameInput();

const girlName=
girlNameInput();

if(!parentName || !girlName){

alert("יש למלא את כל שדות החובה");

return;

}

let digits="";

document.querySelectorAll(".phoneCell").forEach(c=>{

digits+=c.value;

});

let phone="";

if(digits.length===7){

phone=
phonePrefix.value+"-"+digits;

}

currentUser={

id:crypto.randomUUID(),

role:selectedRole,

parentName,

girlName,

phone

};

localStorage.setItem(
"bm_user",
JSON.stringify(currentUser)
);

init();

};

function parentNameInput(){
return document.getElementById("parentName").value.trim();
}

function girlNameInput(){
return document.getElementById("girlName").value.trim();
}

// INIT

function init(){

loginScreen.classList.add("hidden");

appScreen.classList.remove("hidden");

bottomNav.classList.remove("hidden");

renderHeader();

renderUpcoming();

renderEvents();

renderCalendar();

renderMessages();

updateAddButton();

}

if(currentUser){

init();

}

// HEADER

function renderHeader(){

headerName.innerText=
currentUser.parentName;

headerRole.innerText=
`${currentUser.role} של ${currentUser.girlName}`;

}

// UPCOMING

function renderUpcoming(){

const now=new Date();

const upcoming=
events
.filter(e=>new Date(`${e.date}T${e.time}`)>=now)
.slice(0,2);

if(!upcoming.length){

upcomingBar.innerHTML=
"אין אירועים קרובים";

return;

}

upcomingBar.innerHTML=
upcoming.map(e=>{

const d=
new Date(`${e.date}T${e.time}`);

const formatted=
d.toLocaleDateString("he-IL")+" "+
d.toLocaleTimeString("he-IL",{
hour:"2-digit",
minute:"2-digit"
});

return `🚨 ${e.girlName} • ${formatted}`;

}).join("<br>");

}

// ADD BTN

function updateAddButton(){

const exists=
events.find(e=>e.girlName===currentUser.girlName);

if(!exists){

addBtn.classList.remove("hidden");

}

}

addBtn.onclick=openModal;
navAdd.onclick=openModal;

function openModal(){

eventModal.classList.remove("hidden");
eventModal.classList.add("flex");

}

closeModal.onclick=()=>{

eventModal.classList.add("hidden");
eventModal.classList.remove("flex");

};

// PRIVACY

privacyBtn.onclick=()=>{

hideGuests=!hideGuests;

privacyText.classList.toggle("hidden");

privacyBtn.classList.toggle("bg-purple-600");

};

// EVENT

eventForm.onsubmit=async(e)=>{

e.preventDefault();

const date=eventDate.value;
const time=eventTime.value;
const location=eventLocation.value.trim();
const address=eventAddress.value.trim();
const menu=eventMenu.value;

if(!date || !time || !location || !address || !menu){

alert("יש למלא את כל השדות");

return;

}

const exists=
events.find(e=>e.girlName===currentUser.girlName);

if(exists){

alert("האירוע כבר קיים");

return;

}

let image="";

const file=girlImage.files[0];

if(file){

image=await toBase64(file);

}

events.push({

id:crypto.randomUUID(),

ownerId:currentUser.id,

girlName:currentUser.girlName,

date,
time,
location,
address,
menu,
image,

hideGuests,

rsvp:{}

});

localStorage.setItem(
"bm_events",
JSON.stringify(events)
);

renderEvents();
renderUpcoming();
renderCalendar();

eventModal.classList.add("hidden");
eventModal.classList.remove("flex");

};

// EVENTS

function renderEvents(){

eventsTab.innerHTML="";

events.forEach(event=>{

const isMine=
event.ownerId===currentUser.id;

const myVote=
event.rsvp[currentUser.id];

const yes=
Object.values(event.rsvp)
.filter(v=>v==="yes").length;

const maybe=
Object.values(event.rsvp)
.filter(v=>v==="maybe").length;

const no=
Object.values(event.rsvp)
.filter(v=>v==="no").length;

const d=
new Date(`${event.date}T${event.time}`);

const formatted=
d.toLocaleDateString("he-IL")+" "+
d.toLocaleTimeString("he-IL",{
hour:"2-digit",
minute:"2-digit"
});

eventsTab.innerHTML+=`

<div class="event-card glass rounded-[34px] p-5">

<div class="flex gap-4">

<img src="${event.image || 'https://placehold.co/200'}"
class="w-20 h-20 rounded-full object-cover border-4 border-white/10">

<div class="flex-1">

<div class="flex justify-between items-start">

<div>

<h3 class="font-black text-lg">
בת מצווה ל${event.girlName} ✨
</h3>

<div class="text-white/50 text-sm mt-1">
${formatted}
</div>

</div>

</div>

<div class="bg-white/10 px-3 py-1 rounded-full text-xs inline-block mt-2">
${event.menu}
</div>

</div>

</div>

<div class="bg-white/5 rounded-2xl p-4 mt-4 text-sm space-y-2">

<div>📍 ${event.location}</div>

<div>🗺️ ${event.address}</div>

</div>

${!isMine ? `

<div class="grid grid-cols-3 gap-2 mt-4">

<button onclick="vote('${event.id}','yes')"
class="${myVote==='yes'
? 'bg-green-500 active-rsvp'
: 'bg-green-500/15 text-green-300'}
rounded-2xl p-3 font-bold">

מגיע 👍

</button>

<button onclick="vote('${event.id}','maybe')"
class="${myVote==='maybe'
? 'bg-yellow-500 text-black active-rsvp'
: 'bg-yellow-500/15 text-yellow-300'}
rounded-2xl p-3 font-bold">

אולי 🤔

</button>

<button onclick="vote('${event.id}','no')"
class="${myVote==='no'
? 'bg-red-500 active-rsvp'
: 'bg-red-500/15 text-red-300'}
rounded-2xl p-3 font-bold">

לא מגיע 👎

</button>

</div>

` : ''}

<div class="mt-4 pt-4 border-t border-white/10">

${event.hideGuests
? `
<div class="text-white/40 text-sm">
אישורי ההגעה מוסתרים 🔒
</div>
`
:
`
<div class="flex gap-4 flex-wrap text-sm">

<div class="text-green-300">
מגיעים: ${yes}
</div>

<div class="text-yellow-300">
אולי: ${maybe}
</div>

<div class="text-red-300">
לא מגיעים: ${no}
</div>

</div>
`
}

</div>

</div>

`;

});

}

// CALENDAR

function renderCalendar(){

const now=new Date();

const month=now.getMonth();
const year=now.getFullYear();

const days=
new Date(year,month+1,0).getDate();

calendarTab.innerHTML=`

<div class="grid grid-cols-7 gap-2 text-center text-xs mb-3">

<div>א</div>
<div>ב</div>
<div>ג</div>
<div>ד</div>
<div>ה</div>
<div>ו</div>
<div>ש</div>

</div>

<div class="grid grid-cols-7 gap-2">

${Array.from({length:days}).map((_,i)=>{

const day=i+1;

const currentDate=
`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

const event=
events.find(e=>e.date===currentDate);

return `

<div class="calendar-day glass rounded-2xl p-2 text-xs">

<div class="font-bold mb-1">
${day}
</div>

${event ? `

<div class="bg-pink-500 rounded-xl p-1 text-[10px]">
${event.girlName}
</div>

` : ''}

</div>

`;

}).join("")}

</div>

`;

}

// MESSAGES

function publishMessage(){

const text=
messageInput.value.trim();

if(!text) return;

messages.unshift({

id:crypto.randomUUID(),

name:currentUser.parentName,

text,

date:new Date().toLocaleString("he-IL")

});

localStorage.setItem(
"bm_messages",
JSON.stringify(messages)
);

messageInput.value="";

renderMessages();

}

function renderMessages(){

messagesContainer.innerHTML="";

messages.forEach(msg=>{

messagesContainer.innerHTML+=`

<div class="glass rounded-[28px] p-4">

<div class="flex justify-between items-center mb-2">

<div class="font-black">
${msg.name}
</div>

<div class="text-xs text-white/40">
${msg.date}
</div>

</div>

<div class="text-sm leading-7">
${msg.text}
</div>

</div>

`;

});

}

// TABS

function switchTab(tab){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

if(tab==="events"){

eventsTab.classList.add("active");

}

if(tab==="calendar"){

calendarTab.classList.add("active");

}

if(tab==="messages"){

messagesTab.classList.add("active");

}

}

// RSVP

function vote(id,status){

const event=
events.find(e=>e.id===id);

event.rsvp[currentUser.id]=status;

localStorage.setItem(
"bm_events",
JSON.stringify(events)
);

renderEvents();

}

// IMAGE

function toBase64(file){

return new Promise((resolve,reject)=>{

const reader=
new FileReader();

reader.readAsDataURL(file);

reader.onload=
()=>resolve(reader.result);

reader.onerror=
error=>reject(error);

});

}
