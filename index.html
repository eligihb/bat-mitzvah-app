<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>כנפי רוח בנות ו'-4 | לוח בת מצווה</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    body { 
      font-family: 'Assistant', sans-serif; 
      background-color: #f8fafc;
    }
    /* אכיפת תצוגת מובייל בלבד במרכז המסך */
    .mobile-container {
      max-w: 450px;
      margin: 0 auto;
      min-h: screen;
      background-color: #ffffff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    .sticky-header { position: sticky; top: 0; z-index: 40; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <div class="mobile-container min-h-screen flex flex-col pb-20 relative select-none">

    <script>
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL", 
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();
    </script>

    <div id="authModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
      <div class="bg-white w-full max-w-xs rounded-2xl shadow-xl p-5 border border-slate-100 text-right">
        <div class="text-center mb-4">
          <span class="text-xs font-bold text-pink-600 bg-pink-50 px-3 py-1 rounded-full">כנפי רוח בנות | ו'-4</span>
          <h3 class="text-lg font-bold text-indigo-950 mt-2">נעים להכיר! 👋</h3>
          <p class="text-xs text-slate-400 mt-0.5">אנא הגדירו את פרטיכם באופן חד פעמי</p>
        </div>
        
        <div class="space-y-3">
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">שם פרטי של ההורה *</label>
            <input type="text" id="authParentName" placeholder="לדוגמה: מיכל / אבי" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">שם הבת (תלמידת הכיתה) *</label>
            <input type="text" id="authDaughterName" placeholder="לדוגמה: נועה" class="w-full px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1">שם משפחה *</label>
            <div class="flex gap-2 items-center">
              <input type="text" id="authLastName" disabled class="w-full px-3 py-2 bg-slate-100 border border-slate-200 rounded-xl text-sm focus:outline-none text-slate-500">
              <button type="button" onclick="unlockLastName()" class="text-xs text-indigo-600 whitespace-nowrap font-semibold">פתח נעילה</button>
            </div>
          </div>
        </div>
        <button onclick="saveUserIdentity()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-md mt-5 transition-all">אישור וכניסה</button>
      </div>
    </div>

    <div class="sticky-header shadow-sm bg-white">
      <header class="border-b border-slate-100 px-4 py-3 flex justify-between items-center">
        <div>
          <span class="text-[10px] font-bold text-pink-600 bg-pink-50 px-2 py-0.5 rounded-full">כנפי רוח בנות • ו'-4</span>
          <h1 class="text-base font-bold text-indigo-950 mt-0.5">לוח אירועי בת מצווה 👑</h1>
          <p class="text-[11px] text-slate-400" id="welcomeUserTxt">שלום, אורח</p>
        </div>
        <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-xl text-xs font-bold shadow-sm transition-all flex items-center gap-1">
          <span>+</span> הוספת אירוע
        </button>
      </header>

      <div id="nextEventAlert" class="bg-gradient-to-r from-pink-500 to-indigo-600 text-white px-4 py-2 text-center text-xs font-semibold hidden">
        📢 <span class="font-bold">האירוע הקרוב:</span> בת מצווה ל<span id="nextGirl"></span> | <span id="nextDetails"></span>
      </div>

      <nav class="border-b border-slate-200 flex justify-around text-xs font-bold">
        <button id="tabFeedBtn" onclick="switchTab('feed')" class="w-1/2 py-3 text-center border-b-2 border-indigo-600 text-indigo-600 transition-all">🎬 האירועים הקרובים</button>
        <button id="tabGanttBtn" onclick="switchTab('gantt')" class="w-1/2 py-3 text-center border-b-2 border-transparent text-slate-400 transition-all">📅 ריכוז חודשי (גאנט)</button>
      </nav>
    </div>

    <main class="px-4 mt-3 flex-grow">
      <div id="tabFeed" class="space-y-3">
        <div id="feedContainer" class="space-y-3"></div>
      </div>

      <div id="tabGantt" class="hidden space-y-4">
        <div id="ganttContainer" class="space-y-4"></div>
      </div>
    </main>

    <div id="addModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
      <div class="bg-white w-full max-w-xs rounded-2xl shadow-xl overflow-hidden text-right">
        <div class="bg-indigo-950 p-3.5 text-white flex justify-between items-center">
          <h3 class="font-bold text-sm">הוספת אירוע חדש בלוח</h3>
          <button onclick="closeAddModal()" class="text-slate-300 hover:text-white text-xl font-light">&times;</button>
        </div>
        <form id="eventForm" onsubmit="submitEvent(event)" class="p-4 space-y-3">
          <div>
            <label class="block text-xs font-bold text-slate-600 mb-1">שם ילדת בת המצווה *</label>
            <input type="text" id="formGirlName" required oninput="validateForm()" class="w-full px-3 py-1.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500">
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-xs font-bold text-slate-600 mb-1">תאריך אירוע *</label>
              <input type="date" id="formDate" required oninput="validateForm()" class="w-full px-3 py-1.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-600 mb-1">שעת התחלה *</label>
              <input type="time" id="formTime" required oninput="validateForm()" class="w-full px-3 py-1.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500">
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 mb-1">מקום האירוע (אולם/מועדון) *</label>
            <input type="text" id="formLocation" list="locationsList" required oninput="validateForm()" placeholder="הקלד או בחר מהרשימה..." class="w-full px-3 py-1.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500">
            <datalist id="locationsList"></datalist>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 mb-1">כתובת מדויקת לניווט *</label>
            <input type="text" id="formAddress" list="addressesList" required oninput="validateForm()" placeholder="רחוב, עיר (יושלם אוטומטית אם קיים)" class="w-full px-3 py-1.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500">
            <datalist id="addressesList"></datalist>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-600 mb-1">תפריט *</label>
            <select id="formMenu" required oninput="validateForm()" class="w-full px-3 py-1.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-indigo-500 bg-white">
              <option value="חלבי">🥛 חלבי</option>
              <option value="בשרי">🥩 בשרי</option>
            </select>
          </div>
          <div class="pt-2 flex gap-2 justify-end text-xs">
            <button type="button" onclick="closeAddModal()" class="px-3 py-1.5 text-slate-500 hover:bg-slate-50 rounded-xl">ביטול</button>
            <button type="submit" id="submitFormBtn" disabled class="px-4 py-1.5 bg-slate-200 text-slate-400 font-bold rounded-xl shadow-sm transition-all cursor-not-allowed">פרסום בלוח</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script>
    let pName = localStorage.getItem('bt_p_name') || '';
    let dName = localStorage.getItem('bt_d_name') || '';
    let lName = localStorage.getItem('bt_l_name') || '';
    let currentTab = 'feed';
    let allEvents = [];

    const daysOfWeek = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];
    const monthsHeb = ["ינואר", "פברואר", "מרץ", "אפריל", "מאי", "יוני", "יולי", "אוגוסט", "ספטמבר", "אוקטובר", "נובמבר", "דצמבר"];

    document.addEventListener('DOMContentLoaded', () => {
      if (!pName || !dName) {
        document.getElementById('authModal').style.display = 'flex';
      } else {
        updateUserHeader();
        listenToEvents();
      }
    });

    function unlockLastName() {
      const lnInput = document.getElementById('authLastName');
      lnInput.disabled = false;
      lnInput.classList.remove('bg-slate-100', 'text-slate-500');
      lnInput.focus();
    }

    function saveUserIdentity() {
      const parent = document.getElementById('authParentName').value.trim();
      const daughter = document.getElementById('authDaughterName').value.trim();
      const last = document.getElementById('authLastName').value.trim();

      if(parent.length < 2 || daughter.length < 2) return alert('אנא מלאו את שדות החובה');
      
      localStorage.setItem('bt_p_name', parent);
      localStorage.setItem('bt_d_name', daughter);
      localStorage.setItem('bt_l_name', last);
      
      pName = parent;
      dName = daughter;
      lName = last;
      
      document.getElementById('authModal').style.display = 'none';
      updateUserHeader();
      listenToEvents();
    }

    function updateUserHeader() {
      const fullFamilyDisplay = lName ? ` (${lName})` : '';
      document.getElementById('welcomeUserTxt').innerText = `הורה: ${pName} | הבת: ${dName}${fullFamilyDisplay}`;
    }

    function listenToEvents() {
      db.ref('events').on('value', (snapshot) => {
        const data = snapshot.val();
        allEvents = [];
        if (data) {
          for (let id in data) {
            allEvents.push({ id, ...data[id] });
          }
        }
        allEvents.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));
        
        populateDatalists();
        renderStickyAlert();
        renderFeed();
        renderGantt();
      });
    }

    // הוספה מהירה: מילוי רשימות הבחירה האוטומטיות על סמך אירועים קודמים
    function populateDatalists() {
      const locList = document.getElementById('locationsList');
      const addList = document.getElementById('addressesList');
      
      const uniqueLocations = [...new Set(allEvents.map(e => e.location))];
      const uniqueAddresses = [...new Set(allEvents.map(e => e.address))];
      
      locList.innerHTML = uniqueLocations.map(l => `<option value="${l}"></option>`).join('');
      addList.innerHTML = uniqueAddresses.map(a => `<option value="${a}"></option>`).join('');

      // האזנה לשינוי במקום כדי להשלים אוטומטית את הכתובת התואמת
      document.getElementById('formLocation').addEventListener('input', function(e) {
        const match = allEvents.find(ev => ev.location === e.target.value);
        if(match) {
          document.getElementById('formAddress').value = match.address;
          validateForm();
        }
      });
    }

    // ולידציה דינמית לצבע כפתור הפרסום
    function validateForm() {
      const gName = document.getElementById('formGirlName').value.trim();
      const date = document.getElementById('formDate').value;
      const time = document.getElementById('formTime').value;
      const location = document.getElementById('formLocation').value.trim();
      const address = document.getElementById('formAddress').value.trim();
      
      const btn = document.getElementById('submitFormBtn');
      
      if(gName && date && time && location && address) {
        btn.disabled = false;
        btn.className = "px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-sm transition-all cursor-pointer";
      } else {
        btn.disabled = true;
        btn.className = "px-4 py-1.5 bg-slate-200 text-slate-400 font-bold rounded-xl shadow-sm transition-all cursor-not-allowed";
      }
    }

    function renderStickyAlert() {
      const alertEl = document.getElementById('nextEventAlert');
      const todayStr = new Date().toISOString().split('T')[0];
      const futureEvents = allEvents.filter(e => e.date >= todayStr);
      
      if(futureEvents.length > 0) {
        const next = futureEvents[0];
        document.getElementById('nextGirl').innerText = next.girlName;
        const d = new Date(next.date);
        const dateFormatted = `${d.getDate()}/${d.getMonth()+1} (יום ${daysOfWeek[d.getDay()]})`;
        document.getElementById('nextDetails').innerText = `${dateFormatted} ב-${next.time} | ${next.location}`;
        alertEl.classList.remove('hidden');
      } else {
        alertEl.classList.add('hidden');
      }
    }

    function renderFeed() {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '';
      const todayStr = new Date().toISOString().split('T')[0];

      if(allEvents.length === 0) {
        container.innerHTML = `<div class="text-center p-8 text-slate-400 text-xs">אין עדיין אירועים בלוח.</div>`;
        return;
      }

      allEvents.forEach(ev => {
        const isPast = ev.date < todayStr;
        const evDate = new Date(ev.date);
        const dateStr = `${evDate.getDate()}/${evDate.getMonth()+1} (יום ${daysOfWeek[evDate.getDay()]})`;
        
        let rsvpCount = { yes: 0, maybe: 0, no: 0 };
        const attendees = ev.attendees || {};
        for(let key in attendees) {
          if(attendees[key].status === 'yes') rsvpCount.yes++;
          if(attendees[key].status === 'maybe') rsvpCount.maybe++;
          if(attendees[key].status === 'no') rsvpCount.no++;
        }

        // מפתח ייחודי להורה הנוכחי (שילוב שם הורה ושם בת)
        const userKey = `${pName}_${dName}`.replace(/[.#$/\[\]]/g, "_");
        const myStatus = attendees[userKey] ? attendees[userKey].status : '';

        const card = document.createElement('div');
        card.className = `p-4 rounded-2xl border transition-all text-right ${isPast ? 'bg-slate-50 border-slate-200 text-slate-400 opacity-60' : 'bg-white border-slate-100 shadow-sm'}`;
        
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <h3 class="text-base font-bold ${isPast ? 'text-slate-500' : 'text-indigo-950'}">בת מצווה ל${ev.girlName}</h3>
              <p class="text-xs font-semibold mt-0.5 text-pink-600">📅 ${dateStr} בשעה ${ev.time}</p>
            </div>
            <span class="text-[10px] px-2 py-0.5 rounded-full font-bold ${ev.menu === 'חלבי' ? 'bg-blue-50 text-blue-600' : 'bg-amber-50 text-amber-700'}">
              ${ev.menu === 'חלבי' ? '🥛 חלבי' : '🥩 בשרי'}
            </span>
          </div>

          <div class="mt-2 text-xs space-y-0.5 text-slate-600">
            <p>📍 <strong>מקום:</strong> ${ev.location}</p>
            <p>🗺️ <strong>כתובת:</strong> ${ev.address} 
              <a href="https://waze.com/ul?q=${encodeURIComponent(ev.address)}" target="_blank" class="text-indigo-600 font-bold hover:underline mr-1 ${isPast ? 'pointer-events-none text-slate-400' : ''}">🚙 ניווט</a>
            </p>
          </div>

          <div class="mt-3 pt-2.5 border-t border-slate-100 flex items-center justify-between text-[11px] font-semibold text-slate-500">
            <div class="flex gap-2">
              <span class="text-emerald-600">🟩 ${rsvpCount.yes}</span>
              <span class="text-amber-600">🟨 ${rsvpCount.maybe}</span>
              <span class="text-rose-600">🟥 ${rsvpCount.no}</span>
            </div>
            <button onclick="toggleAttendeeList('${ev.id}')" class="text-indigo-600 hover:underline">מי מגיע? 📋</button>
          </div>

          <div id="list-${ev.id}" class="hidden mt-2 p-2.5 bg-slate-50 rounded-xl text-xs space-y-1 border border-slate-100 text-slate-600">
            <div class="max-h-24 overflow-y-auto space-y-1">
              ${Object.keys(attendees).length === 0 ? 'אין עדיין תגובות.' : Object.values(attendees).map(att => {
                let badge = att.status === 'yes' ? '🟩' : (att.status === 'maybe' ? '🟨' : '🟥');
                return `<div>${badge} <strong>${att.parent}</strong> (של ${att.daughter})</div>`;
              }).join('')}
            </div>
          </div>

          <div class="mt-3 grid grid-cols-3 gap-1.5 ${isPast ? 'hidden' : ''}">
            <button onclick="updateRSVP('${ev.id}', 'yes')" class="py-1.5 rounded-xl text-xs font-bold border transition-all ${myStatus === 'yes' ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-slate-50 border-slate-200 text-slate-600'}">מגיע 👍</button>
            <button onclick="updateRSVP('${ev.id}', 'maybe')" class="py-1.5 rounded-xl text-xs font-bold border transition-all ${myStatus === 'maybe' ? 'bg-amber-500 text-white border-amber-500' : 'bg-slate-50 border-slate-200 text-slate-600'}">אולי 🤔</button>
            <button onclick="updateRSVP('${ev.id}', 'no')" class="py-1.5 rounded-xl text-xs font-bold border transition-all ${myStatus === 'no' ? 'bg-rose-600 text-white border-rose-600' : 'bg-slate-50 border-slate-200 text-slate-600'}">לא 👎</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function renderGantt() {
      const container = document.getElementById('ganttContainer');
      container.innerHTML = '';
      if (allEvents.length === 0) return;

      const monthsGroup = {};
      allEvents.forEach(ev => {
        const d = new Date(ev.date);
        const groupKey = `${d.getFullYear()}-${d.getMonth()}`;
        if (!monthsGroup[groupKey]) {
          monthsGroup[groupKey] = { title: `${monthsHeb[d.getMonth()]} ${d.getFullYear()}`, events: [] };
        }
        monthsGroup[groupKey].events.push(ev);
      });

      for (let key in monthsGroup) {
        const month = monthsGroup[key];
        const monthBlock = document.createElement('div');
        monthBlock.className = 'bg-white rounded-2xl p-3 shadow-sm border border-slate-100 text-right';
        
        let eventsHtml = month.events.map(ev => {
          const d = new Date(ev.date);
          const todayStr = new Date().toISOString().split('T')[0];
          const isPast = ev.date < todayStr;

          return `
            <div class="flex items-center justify-between py-2 border-b border-slate-100 last:border-0 ${isPast ? 'opacity-40 text-slate-400 line-through' : ''}">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg flex flex-col items-center justify-center font-bold text-xs ${isPast ? 'bg-slate-200 text-slate-500' : 'bg-indigo-50 text-indigo-600'}">
                  <span>${d.getDate()}</span>
                </div>
                <div>
                  <h4 class="font-bold text-xs ${isPast ? 'text-slate-500' : 'text-slate-900'}">בת מצווה ל${ev.girlName}</h4>
                  <p class="text-[10px] text-slate-400">${ev.time} | ${ev.location}</p>
                </div>
              </div>
              <span class="text-xs">${ev.menu === 'חלבי' ? '🥛' : '🥩'}</span>
            </div>
          `;
        }).join('');

        monthBlock.innerHTML = `
          <h3 class="text-xs font-bold text-indigo-900 mb-1.5 border-b pb-1 border-indigo-50/50">📂 ${month.title}</h3>
          <div class="divide-y divide-slate-50">${eventsHtml}</div>
        `;
        container.appendChild(monthBlock);
      }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabFeed').classList.toggle('hidden', tab !== 'feed');
      document.getElementById('tabGantt').classList.toggle('hidden', tab !== 'gantt');
      document.getElementById('tabFeedBtn').className = tab === 'feed' ? 'w-1/2 py-3 text-center border-b-2 border-indigo-600 text-indigo-600 transition-all' : 'w-1/2 py-3 text-center border-b-2 border-transparent text-slate-400 transition-all';
      document.getElementById('tabGanttBtn').className = tab === 'gantt' ? 'w-1/2 py-3 text-center border-b-2 border-indigo-600 text-indigo-600 transition-all' : 'w-1/2 py-3 text-center border-b-2 border-transparent text-slate-400 transition-all';
    }

    function toggleAttendeeList(id) {
      document.getElementById(`list-${id}`).classList.toggle('hidden');
    }

    function updateRSVP(eventId, status) {
      const userKey = `${pName}_${dName}`.replace(/[.#$/\[\]]/g, "_");
      db.ref(`events/${eventId}/attendees/${userKey}`).set({
        parent: pName,
        daughter: dName,
        status: status
      });
    }

    function openAddModal() { 
      document.getElementById('addModal').style.display = 'flex'; 
      validateForm();
    }
    function closeAddModal() { 
      document.getElementById('addModal').style.display = 'none'; 
      document.getElementById('eventForm').reset();
    }

    function submitEvent(e) {
      e.preventDefault();
      
      const date = document.getElementById('formDate').value;
      const girlName = document.getElementById('formGirlName').value.trim();
      const time = document.getElementById('formTime').value;
      const location = document.getElementById('formLocation').value.trim();
      const address = document.getElementById('formAddress').value.trim();
      const menu = document.getElementById('formMenu').value;

      // מניעת כפל: בדיקה האם כבר קיים אירוע לילדה הזו או בתאריך הזה
      const dateConflict = allEvents.find(ev => ev.date === date);
      const girlConflict = allEvents.find(ev => ev.girlName.toLowerCase() === girlName.toLowerCase());

      if (girlConflict) {
        alert(`שים לב! כבר קיים בלוח אירוע עבור הבת "${girlName}". מניעת רישום כפול.`);
        return;
      }

      if (dateConflict) {
        const confirmDouble = confirm(`שים לב! בתאריך זה כבר קיים אירוע עבור ${dateConflict.girlName}.\nהאם בכל זאת ברצונך לקבוע לאותו היום?`);
        if (!confirmDouble) return;
      }

      const newEvent = { girlName, date, time, location, address, menu };
      
      db.ref('events').push(newEvent)
        .then(() => {
          closeAddModal();
        })
        .catch((err) => {
          alert('שגיאה בשמירה: ' + err.message);
        });
    }
  </script>
</body>
</html>
