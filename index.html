<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול בת מצווה כיתתית - ו'4</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { max-width: 430px; margin: 0 auto; background-color: #f9fafb; font-size: 16px; }
        input, select, button { font-size: 16px !important; }
        .sticky-alert { position: sticky; top: 0; z-index: 40; }
    </style>
</head>
<body class="font-sans text-gray-800 min-h-screen flex flex-col pb-20 relative">

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
            <h2 class="text-xl font-bold text-center text-purple-700 mb-6">ברוכים הבאים! 👋</h2>
            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                <div class="flex gap-4">
                    <label class="parent-role-label flex items-center gap-2 border p-3 rounded-xl flex-1 justify-center cursor-pointer transition-all">
                        <input type="radio" name="parentRole" value="אמא" checked class="hidden" onchange="updateRoleUI()">
                        <span>אמא 👩‍🦰</span>
                    </label>
                    <label class="parent-role-label flex items-center gap-2 border p-3 rounded-xl flex-1 justify-center cursor-pointer transition-all">
                        <input type="radio" name="parentRole" value="אבא" class="hidden" onchange="updateRoleUI()">
                        <span>אבא 👨</span>
                    </label>
                </div>
                <input type="text" id="parentName" required class="w-full border p-3 rounded-xl" placeholder="שם מלא (פרטי ומשפחה)">
                <input type="text" id="girlName1" required class="w-full border p-3 rounded-xl" placeholder="שם הילדה החוגגת">
                <button type="submit" class="w-full bg-purple-600 text-white font-bold p-3 rounded-xl">אישור וכניסה</button>
            </form>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white p-4 shadow-sm border-b flex justify-between items-center">
        <div>
            <div class="flex items-center gap-2">
                <h1 id="headerParentName" class="font-extrabold text-lg"></h1>
                <button onclick="logout()" class="text-red-500 text-xs font-bold px-2"><i class="fa-solid fa-door-open"></i></button>
            </div>
            <p id="headerSubDetails" class="text-xs text-gray-500"></p>
        </div>
    </header>

    <main class="flex-1 p-4 overflow-y-auto">
        <div id="tabFeed" class="tab-content space-y-4"></div>
        
        <!-- Add Event Form -->
        <div id="tabAdd" class="tab-content hidden bg-white p-5 rounded-2xl shadow-sm border">
            <h3 class="font-bold text-lg text-purple-700 mb-4">פרסום אירוע</h3>
            <form id="addEventForm" onsubmit="createNewEvent(event)" class="space-y-4">
                <input type="date" id="eventDate" required class="w-full border p-2.5 rounded-xl">
                <input type="time" id="eventTime" required class="w-full border p-2.5 rounded-xl">
                <input type="text" id="eventLocation" required class="w-full border p-2.5 rounded-xl" placeholder="מקום">
                <input type="text" id="eventAddress" required class="w-full border p-2.5 rounded-xl" placeholder="כתובת">
                <input type="text" id="eventConcept" class="w-full border p-2.5 rounded-xl" placeholder="קונספט אירוע (אופציונלי)">
                <button type="submit" class="w-full bg-purple-600 text-white p-3 rounded-xl">פרסום בלוח הכיתתי 🚀</button>
            </form>
        </div>
    </main>

    <!-- Floating Add Button -->
    <button onclick="switchTab('add')" class="fixed bottom-20 left-6 bg-purple-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl z-40">
        <i class="fa-solid fa-plus"></i>
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Config (הכנס כאן את הפרטים שלך)
        const firebaseConfig = { databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com/" };
        const db = getDatabase(initializeApp(firebaseConfig));

        // לוגיקה חדשה: מניעת שבת
        function isShabbat(dateStr, timeStr) {
            const d = new Date(`${dateStr}T${timeStr}`);
            const day = d.getDay(); // 5=שישי, 6=שבת
            const hour = d.getHours();
            if (day === 5 && hour >= 19) return true;
            if (day === 6 && hour < 20) return true;
            return false;
        }

        window.updateRoleUI = function() {
            document.querySelectorAll('.parent-role-label').forEach(el => {
                el.classList.remove('bg-purple-100', 'border-purple-500');
                if(el.querySelector('input').checked) el.classList.add('bg-purple-100', 'border-purple-500');
            });
        }

        window.createNewEvent = function(event) {
            event.preventDefault();
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const parentName = JSON.parse(localStorage.getItem('batMitzvahUser')).parentName;
            const familyName = parentName.split(' ').pop();

            if (isShabbat(date, time)) return alert("לא ניתן לקיים אירוע בזמן שבת!");

            // בדיקת כפילות שם משפחה
            // ... (לוגיקת בדיקה ב-allEvents)

            // שמירה ב-Firebase
            const newEventRef = push(ref(db, 'events'));
            set(newEventRef, { .../* נתונים */, familyName }).then(() => alert("פורסם!"));
        }
    </script>
</body>
</html>
