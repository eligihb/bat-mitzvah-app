<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול בת מצווה כיתתית</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { max-width: 430px; margin: 0 auto; background-color: #f9fafb; }
    </style>
</head>
<body class="font-sans text-gray-800 min-h-screen pb-20">

    <div id="authModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h2 class="text-xl font-bold text-center mb-6">כניסה למערכת</h2>
            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                <input type="text" id="parentName" required class="w-full border p-3 rounded-xl" placeholder="שם מלא">
                <input type="tel" id="userPhone" required class="w-full border p-3 rounded-xl" placeholder="טלפון (ללא מקפים)">
                <button type="submit" class="w-full bg-purple-600 text-white p-3 rounded-xl font-bold">כניסה</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- הנה התיקון הקריטי: הכנס כאן את הכתובת שלך ---
        const firebaseConfig = {
            databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // פונקציית שמירה משופרת עם בדיקת שגיאות
        window.createNewEvent = async function(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitEventBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "שומר...";

            try {
                const eventData = {
                    girlName: document.getElementById('eventGirlName').value,
                    date: document.getElementById('eventDate').value,
                    time: document.getElementById('eventTime').value,
                    location: document.getElementById('eventLocation').value,
                    address: document.getElementById('eventAddress').value,
                    menu: document.getElementById('eventMenu').value,
                    timestamp: Date.now()
                };

                const eventsRef = ref(db, 'events');
                await push(eventsRef, eventData);
                
                alert("האירוע פורסם בהצלחה!");
                document.getElementById('addEventForm').reset();
                window.switchTab('feed');
            } catch (error) {
                console.error("שגיאת Firebase:", error);
                alert("אירעה שגיאה בפרסום. וודא שכתובת ה-Database בכתובת הקוד נכונה ושחוקי ה-Firebase מאפשרים כתיבה.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "פרסום בלוח הכיתתי 🚀";
            }
        };

        // ... שאר הפונקציות שלך ...
    </script>
</body>
</html>
