    // פונקציית בדיקת שבת
    function isShabbat(dateString, timeString) {
        const dateTime = new Date(`${dateString}T${timeString}`);
        const day = dateTime.getDay(); // 0 = Sunday, 5 = Friday, 6 = Saturday
        const hour = dateTime.getHours();
        
        // חסימה: שישי מ-19:00 עד שבת 20:00
        if (day === 5 && hour >= 19) return true;
        if (day === 6 && hour < 20) return true;
        return false;
    }

        const date = document.getElementById('eventDate').value;
        const time = document.getElementById('eventTime').value;

        if (isShabbat(date, time)) {
