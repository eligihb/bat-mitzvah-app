<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>אירועי בת מצווה</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0 auto;
max-width:430px;
background:
radial-gradient(circle at top right, rgba(168,85,247,.22), transparent 35%),
radial-gradient(circle at bottom left, rgba(236,72,153,.18), transparent 35%),
#07070a;
font-family:sans-serif;
color:white;
overflow-x:hidden;
min-height:100vh;
}

.glass{
background:rgba(255,255,255,.07);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
}

.hiddenTab{
display:none;
}

.activeTab{
display:block;
}

.toast{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:9999;
padding:14px 22px;
border-radius:18px;
font-weight:700;
background:#111827;
color:white;
opacity:0;
pointer-events:none;
transition:.3s;
}

.toast.show{
opacity:1;
top:30px;
}

.event-card{
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.calendar-day{
min-height:88px;
position:relative;
}

.calendar-dot{
width:8px;
height:8px;
border-radius:999px;
background:#ec4899;
}

.loader{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,.15);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

</style>

</head>

<body>

<div id="toast"
class="toast"></div>

<!-- LOADER -->

<div id="loaderScreen"
class="fixed inset-0 bg-black/70 backdrop-blur-xl z-[999] hidden items-center justify-center">

<div class="loader"></div>

</div>

<!-- LOGIN -->

<div id="loginScreen"
class="min-h-screen flex items-center justify-center p-4">

<div class="glass rounded-[34px] p-5 w-full max-w-sm">

<h1 class="text-2xl font-black text-center mb-6">
אירועי בת מצווה ✨
</h1>

<form id="loginForm"
class="space-y-4">

<div class="grid grid-cols-2 gap-3">

<button type="button"
class="roleBtn bg-purple-600 rounded-2xl p-3 font-bold"
data-role="אמא">

אמא 👩

</button>

<button type="button"
class="roleBtn bg-white/10 rounded-2xl p-3 font-bold"
data-role="אבא">

אבא 👨

</button>

</div>

<input id="parentName"
placeholder="שם ההורה"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none">

<input id="girlName"
placeholder="שם הילדה"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none">

<input id="phoneInput"
type="tel"
inputmode="numeric"
placeholder="טלפון"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none">
<button
class="w-full rounded-2xl p-3 font-black bg-gradient-to-r from-pink-500 to-purple-600">

כניסה

</button>

</form>

</div>

</div>

<!-- APP -->

<div id="appScreen"
class="hidden pb-28">

<!-- HEADER -->

<header
class="sticky top-0 z-50 bg-black/40 backdrop-blur-xl border-b border-white/5">

<div class="p-4">

<div class="flex justify-between items-center">

<div>

<h2 id="headerName"
class="font-black text-lg"></h2>

<div id="headerSub"
class="text-sm text-purple-200 mt-1"></div>

</div>

<button id="logoutBtn"
class="text-red-300 text-sm">

התנתקות

</button>

</div>

</div>

</header>

<!-- UPCOMING -->

<div id="upcomingBar"
class="mx-4 mt-4 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-4 font-bold text-sm shadow-xl">

טוען אירועים...

</div>

<!-- EVENTS -->

<div id="eventsTab"
class="activeTab p-4 space-y-4"></div>

<!-- CALENDAR -->

<div id="calendarTab"
class="hiddenTab p-4"></div>

<!-- MESSAGES -->

<div id="messagesTab"
class="hiddenTab p-4 space-y-4">

<div class="glass rounded-[28px] p-4">

<textarea id="messageInput"
class="w-full bg-white/10 rounded-2xl p-4 outline-none min-h-[120px]"
placeholder="כתוב הודעה..."></textarea>

<button id="sendMessageBtn"
class="w-full mt-3 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 font-black">

שלח הודעה

</button>

</div>

<div id="messagesContainer"
class="space-y-3"></div>

</div>

</div>

<!-- ADD EVENT BTN -->

<button id="addEventBtn"
class="fixed bottom-24 left-6 z-50 w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-purple-600 shadow-2xl text-3xl font-black hidden">

+

</button>

<!-- EVENT MODAL -->

<div id="eventModal"
class="hidden fixed inset-0 bg-black/70 z-50 items-center justify-center p-4">

<div class="glass rounded-[34px] p-5 w-full max-w-sm">

<div class="flex justify-between items-center mb-5">

<h3 class="font-black text-lg">
יצירת אירוע
</h3>

<button id="closeModalBtn">
<i class="fa-solid fa-xmark"></i>
</button>

</div>

<form id="eventForm"
class="space-y-4">

<input type="date"
id="eventDate"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="time"
id="eventTime"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="text"
id="eventLocation"
placeholder="מקום האירוע"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<input type="text"
id="eventAddress"
placeholder="כתובת"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<select id="eventMenu"
class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">

<option value="">בחר תפריט</option>
<option value="חלבי 🥛">חלבי 🥛</option>
<option value="בשרי 🥩">בשרי 🥩</option>

</select>

<input type="file"
id="eventImage"
accept="image/*">

<label class="flex items-center gap-3 text-sm">

<input type="checkbox"
id="hideAttendees">

הסתר אישורי הגעה

</label>

<button
class="w-full rounded-2xl p-3 font-black bg-gradient-to-r from-pink-500 to-purple-600">

פרסם אירוע 🚀

</button>

</form>

</div>

</div>

<!-- NAV -->

<nav
class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto h-20 bg-black/70 backdrop-blur-2xl border-t border-white/10 flex z-50">

<button onclick="switchTab('events')"
class="flex-1 flex flex-col items-center justify-center gap-1 text-pink-300 navBtn">

<i class="fa-solid fa-list"></i>

<span class="text-[11px]">
אירועים
</span>

</button>

<button onclick="switchTab('calendar')"
class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40 navBtn">

<i class="fa-solid fa-calendar-days"></i>

<span class="text-[11px]">
לוח שנה
</span>

</button>

<button onclick="switchTab('messages')"
class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40 navBtn">

<i class="fa-solid fa-bell"></i>

<span class="text-[11px]">
הודעות
</span>

</button>

</nav>

<script>

// ========================================
// CONFIG
// ========================================

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbyRNLuyH_sP-7GJIpvveZWvDdtIu5bj6nfNyVG1G3y7g7rT88SHOtqwyPhWKCBtWpA/exec";

// ========================================
// STATE
// ========================================

const state = {

currentUser:
JSON.parse(localStorage.getItem("bm_user")) || null,

events:[],
rsvps:[],
messages:[],

month:new Date().getMonth(),
year:new Date().getFullYear()

};

let selectedRole="אמא";

// ========================================
// HELPERS
// ========================================

function toast(text){

const el =
document.getElementById("toast");

el.innerText=text;

el.classList.add("show");

setTimeout(()=>{

el.classList.remove("show");

},2500);

}

function showLoader(){

loaderScreen.classList.add("flex");
loaderScreen.classList.remove("hidden");

}

function hideLoader(){

loaderScreen.classList.remove("flex");
loaderScreen.classList.add("hidden");

}

function formatDate(date,time){

const d =
new Date(`${date}T${time}`);

return new Intl.DateTimeFormat(
'he-IL',
{
day:'2-digit',
month:'2-digit',
year:'numeric',
hour:'2-digit',
minute:'2-digit'
}
).format(d);

}

// ========================================
// API
// ========================================

async function fetchData(){

try{

showLoader();

const res =
await fetch(SCRIPT_URL);

const data =
await res.json();

state.events =
data.events || [];

state.rsvps =
data.rsvps || [];

state.messages =
data.messages || [];

renderUpcoming();
renderEvents();
renderCalendar();
renderMessages();
updateAddButton();

}catch(err){

toast("שגיאה בטעינת נתונים");

console.error(err);

}

hideLoader();

}

async function api(action,payload={}){

const res =
await fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify({
action,
...payload
})

});

return await res.json();

}

// ========================================
// LOGIN
// ========================================

const loginFormEl =
document.getElementById("loginForm");

const parentNameEl =
document.getElementById("parentName");

const girlNameEl =
document.getElementById("girlName");

const phoneInputEl =
document.getElementById("phoneInput");

// ROLE

document.querySelectorAll(".roleBtn").forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelectorAll(".roleBtn").forEach(b=>{

b.classList.remove("bg-purple-600");
b.classList.add("bg-white/10");

});

btn.classList.remove("bg-white/10");
btn.classList.add("bg-purple-600");

selectedRole =
btn.dataset.role;

});

});

// PHONE

phoneInputEl.addEventListener("input",(e)=>{

e.target.value =
e.target.value.replace(/[^0-9]/g,'');

});

// LOGIN

loginFormEl.addEventListener("submit",(e)=>{

e.preventDefault();

const parentName =
parentNameEl.value.trim();

const girl =
girlNameEl.value.trim();

const phone =
phoneInputEl.value.trim();

if(!parentName || !girl){

toast("יש למלא את כל השדות");

return;

}

state.currentUser={

id:crypto.randomUUID(),

parentName,

girlName:girl,

role:selectedRole,

phone

};

localStorage.setItem(
"bm_user",
JSON.stringify(state.currentUser)
);

toast("התחברת בהצלחה");

init();

});

init();

};

// ========================================
// INIT
// ========================================

async function init(){

loginScreen.classList.add("hidden");

appScreen.classList.remove("hidden");

renderHeader();

await fetchData();

}

if(state.currentUser){

init();

}

// ========================================
// HEADER
// ========================================

function renderHeader(){

headerName.innerText =
state.currentUser.parentName;

headerSub.innerText =
`${state.currentUser.role} של ${state.currentUser.girlName}`;

}

// ========================================
// UPCOMING
// ========================================

function renderUpcoming(){

const now =
new Date();

const upcoming =
state.events
.filter(e=>
new Date(`${e.date}T${e.time}`)>=now
)
.sort((a,b)=>
new Date(`${a.date}T${a.time}`) -
new Date(`${b.date}T${b.time}`)
)
.slice(0,2);

if(!upcoming.length){

upcomingBar.innerHTML =
"אין אירועים קרובים";

return;

}

upcomingBar.innerHTML =
upcoming.map(e=>`

<div class="mb-2">

🚨 ${e.girlName}
•
${formatDate(e.date,e.time)}

</div>

`).join("");

}

// ========================================
// ADD BTN
// ========================================

function updateAddButton(){

const exists =
state.events.find(
e=>e.ownerId===state.currentUser.id
);

if(exists){

addEventBtn.classList.add("hidden");

}else{

addEventBtn.classList.remove("hidden");

}

}

addEventBtn.onclick=()=>{

eventModal.classList.add("flex");
eventModal.classList.remove("hidden");

};

closeModalBtn.onclick=()=>{

eventModal.classList.remove("flex");
eventModal.classList.add("hidden");

};

// ========================================
// EVENT CREATE
// ========================================

eventForm.onsubmit=async(e)=>{

e.preventDefault();

const exists =
state.events.find(
e=>e.ownerId===state.currentUser.id
);

if(exists){

toast("כבר קיים אירוע");

return;

}

showLoader();

let image="";

const file =
eventImage.files[0];

if(file){

image =
await toBase64(file);

}

await api("createEvent",{

id:crypto.randomUUID(),

ownerId:
state.currentUser.id,

ownerName:
state.currentUser.parentName,

girlName:
state.currentUser.girlName,

date:eventDate.value,

time:eventTime.value,

location:eventLocation.value,

address:eventAddress.value,

menu:eventMenu.value,

hideAttendees:
hideAttendees.checked,

image,

phone:
state.currentUser.phone,

role:
state.currentUser.role

});

eventModal.classList.remove("flex");
eventModal.classList.add("hidden");

toast("האירוע פורסם 🎉");

await fetchData();

hideLoader();

};

// ========================================
// EVENTS
// ========================================

function renderEvents(){

eventsTab.innerHTML="";

if(!state.events.length){

eventsTab.innerHTML=`

<div class="glass rounded-[28px] p-5 text-center text-white/50">

אין אירועים כרגע

</div>

`;

return;

}

state.events.forEach(event=>{

const isMine =
event.ownerId ===
state.currentUser.id;

const eventRsvps =
state.rsvps.filter(
r=>r.eventId===event.id
);

const myVote =
eventRsvps.find(
r=>r.userId===state.currentUser.id
)?.status;

const yes =
eventRsvps.filter(
r=>r.status==="yes"
).length;

const maybe =
eventRsvps.filter(
r=>r.status==="maybe"
).length;

const no =
eventRsvps.filter(
r=>r.status==="no"
).length;

eventsTab.innerHTML += `

<div class="event-card glass rounded-[34px] p-5">

<div class="flex gap-4">

<img src="${
event.image ||
'https://placehold.co/200'
}"
class="w-20 h-20 rounded-full object-cover border-4 border-white/10">

<div class="flex-1">

<h3 class="font-black text-lg">

בת מצווה ל${event.girlName} ✨

</h3>

<div class="text-white/50 text-sm mt-1">

${formatDate(event.date,event.time)}

</div>

<div class="mt-2 text-sm">

📍 ${event.location}

</div>

<div class="mt-1 text-xs text-white/60">

${event.address}

</div>

<div class="mt-3 inline-block bg-white/10 px-3 py-1 rounded-full text-xs">

${event.menu}

</div>

</div>

</div>

${
!isMine
?

`

<div class="grid grid-cols-3 gap-2 mt-5">

<button onclick="vote('${event.id}','yes')"
class="${
myVote==="yes"
?
'bg-green-500'
:
'bg-green-500/15 text-green-300'
}
rounded-2xl p-3 font-bold">

👍 מגיע

</button>

<button onclick="vote('${event.id}','maybe')"
class="${
myVote==="maybe"
?
'bg-yellow-500 text-black'
:
'bg-yellow-500/15 text-yellow-300'
}
rounded-2xl p-3 font-bold">

🤔 אולי

</button>

<button onclick="vote('${event.id}','no')"
class="${
myVote==="no"
?
'bg-red-500'
:
'bg-red-500/15 text-red-300'
}
rounded-2xl p-3 font-bold">

👎 לא

</button>

</div>

`

:
`

<div class="mt-4 flex gap-2">

<button onclick="deleteEvent('${event.id}')"
class="bg-red-500/15 text-red-300 rounded-2xl px-4 py-2 text-sm font-bold">

מחק אירוע

</button>

</div>

`

}

<div class="mt-4 pt-4 border-t border-white/10">

${
event.hideAttendees === true ||
event.hideAttendees === "TRUE"
?

`

<div class="text-white/40 text-sm">

אישורי הגעה מוסתרים 🔒

</div>

`

:

`

<div class="flex gap-4 text-sm flex-wrap">

<div class="text-green-300">

מגיעים: ${yes}

</div>

<div class="text-yellow-300">

אולי: ${maybe}

</div>

<div class="text-red-300">

לא מגיעים: ${no}

</div>

</div>

`

}

</div>

</div>

`;

});

}

// ========================================
// RSVP
// ========================================

async function vote(eventId,status){

showLoader();

await api("vote",{

eventId,

userId:
state.currentUser.id,

userName:
state.currentUser.parentName,

status

});

toast("אישור ההגעה עודכן");

await fetchData();

hideLoader();

}

// ========================================
// DELETE EVENT
// ========================================

async function deleteEvent(eventId){

if(!confirm("למחוק את האירוע?")){
return;
}

showLoader();

await api("deleteEvent",{
eventId
});

toast("האירוע נמחק");

await fetchData();

hideLoader();

}

// ========================================
// CALENDAR
// ========================================

function renderCalendar(){

const month =
state.month;

const year =
state.year;

const firstDay =
new Date(year,month,1).getDay();

const daysInMonth =
new Date(year,month+1,0).getDate();

let html=`

<div class="flex justify-between items-center mb-4">

<button onclick="changeMonth(-1)"
class="glass rounded-xl px-4 py-2">

<i class="fa-solid fa-chevron-right"></i>

</button>

<div class="font-black">

${new Intl.DateTimeFormat(
'he-IL',
{
month:'long',
year:'numeric'
}
).format(new Date(year,month))
}

</div>

<button onclick="changeMonth(1)"
class="glass rounded-xl px-4 py-2">

<i class="fa-solid fa-chevron-left"></i>

</button>

</div>

<div class="grid grid-cols-7 gap-2 text-center text-xs mb-2">

<div>א</div>
<div>ב</div>
<div>ג</div>
<div>ד</div>
<div>ה</div>
<div>ו</div>
<div>ש</div>

</div>

<div class="grid grid-cols-7 gap-2">

`;

for(let i=0;i<firstDay;i++){

html += `
<div></div>
`;

}

for(let day=1;day<=daysInMonth;day++){

const dateStr =
`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

const dayEvents =
state.events.filter(
e=>e.date===dateStr
);

html += `

<div class="calendar-day glass rounded-2xl p-2">

<div class="font-bold text-xs">

${day}

</div>

<div class="mt-2 flex flex-col gap-1">

${dayEvents.map(e=>`

<div class="bg-pink-500 rounded-lg px-1 py-[2px] text-[9px] truncate">

${e.girlName}

</div>

`).join("")}

</div>

</div>

`;

}

html += `
</div>
`;

calendarTab.innerHTML=html;

}

function changeMonth(dir){

state.month += dir;

if(state.month < 0){

state.month=11;
state.year--;

}

if(state.month > 11){

state.month=0;
state.year++;

}

renderCalendar();

}

// ========================================
// MESSAGES
// ========================================

sendMessageBtn.onclick=
publishMessage;

async function publishMessage(){

const text =
messageInput.value.trim();

if(!text){
return;
}

showLoader();

await api("createMessage",{

id:crypto.randomUUID(),

userName:
state.currentUser.parentName,

messageText:text

});

messageInput.value="";

toast("ההודעה נשלחה");

await fetchData();

hideLoader();

}

function renderMessages(){

messagesContainer.innerHTML="";

const sorted =
[...state.messages]
.reverse();

sorted.forEach(msg=>{

messagesContainer.innerHTML += `

<div class="glass rounded-[28px] p-4">

<div class="flex justify-between items-center mb-2">

<div class="font-black">

${msg.userName}

</div>

<div class="text-xs text-white/40">

${new Date(msg.timestamp)
.toLocaleString("he-IL")}

</div>

</div>

<div class="text-sm leading-7">

${msg.messageText}

</div>

</div>

`;

});

}

// ========================================
// TABS
// ========================================

function switchTab(tab){

document
.querySelectorAll(".hiddenTab,.activeTab")
.forEach(el=>{

el.classList.remove("activeTab");
el.classList.add("hiddenTab");

});

document
.querySelectorAll(".navBtn")
.forEach(btn=>{

btn.classList.remove("text-pink-300");
btn.classList.add("text-white/40");

});

if(tab==="events"){

eventsTab.classList.add("activeTab");
eventsTab.classList.remove("hiddenTab");

document
.querySelectorAll(".navBtn")[0]
.classList.add("text-pink-300");

}

if(tab==="calendar"){

calendarTab.classList.add("activeTab");
calendarTab.classList.remove("hiddenTab");

document
.querySelectorAll(".navBtn")[1]
.classList.add("text-pink-300");

}

if(tab==="messages"){

messagesTab.classList.add("activeTab");
messagesTab.classList.remove("hiddenTab");

document
.querySelectorAll(".navBtn")[2]
.classList.add("text-pink-300");

}

}

// ========================================
// IMAGE
// ========================================

function toBase64(file){

return new Promise((resolve,reject)=>{

const reader =
new FileReader();

reader.readAsDataURL(file);

reader.onload=
()=>resolve(reader.result);

reader.onerror=
error=>reject(error);

});

}

// ========================================
// LOGOUT
// ========================================

logoutBtn.onclick=()=>{

localStorage.removeItem("bm_user");

location.reload();

};

</script>

</body>

</html>
