<!-- =========================
החלף את אזור הטלפון הקיים בזה
========================= -->

<div>
    <label class="text-sm font-bold mb-1 block">
        טלפון
        <span class="text-gray-400 text-xs">(לא חובה)</span>
    </label>

    <div class="flex items-center gap-2" dir="ltr">

        <!-- PREFIX -->

        <select id="phonePrefix"
            class="h-14 px-3 rounded-2xl bg-white/10 border border-white/10 text-white outline-none">

            <option value="051">051</option>
            <option value="052">052</option>
            <option value="053">053</option>
            <option value="054">054</option>
            <option value="055">055</option>
            <option value="056">056</option>
            <option value="057">057</option>
            <option value="058">058</option>
            <option value="059">059</option>

        </select>

        <span class="text-white/40 font-black">-</span>

        <!-- CELLS -->

        <div class="flex gap-1 flex-1 justify-between">

            <input maxlength="1" class="phoneCell phoneStyle">
            <input maxlength="1" class="phoneCell phoneStyle">
            <input maxlength="1" class="phoneCell phoneStyle">
            <input maxlength="1" class="phoneCell phoneStyle">
            <input maxlength="1" class="phoneCell phoneStyle">
            <input maxlength="1" class="phoneCell phoneStyle">
            <input maxlength="1" class="phoneCell phoneStyle">

        </div>

    </div>
</div>

<style>

.phoneStyle{
    width:42px;
    height:56px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.08);
    text-align:center;
    font-weight:900;
    color:white;
    outline:none;
    transition:.2s;
}

.phoneStyle:focus{
    border-color:#a855f7;
    box-shadow:0 0 0 3px rgba(168,85,247,.2);
    background:rgba(255,255,255,.14);
}

</style>

<script>

document.querySelectorAll(".phoneCell").forEach((cell,index)=>{

    cell.addEventListener("input",(e)=>{

        e.target.value=e.target.value.replace(/[^0-9]/g,'');

        if(e.target.value.length===1){

            const next=document.querySelectorAll(".phoneCell")[index+1];

            if(next) next.focus();

        }

    });

    cell.addEventListener("keydown",(e)=>{

        if(e.key==="Backspace" && !cell.value){

            const prev=document.querySelectorAll(".phoneCell")[index-1];

            if(prev) prev.focus();

        }

    });

});

</script>

<script>

function updateContactButtons(){

    const callBtn=document.getElementById("callBtn");
    const waBtn=document.getElementById("waBtn");

    if(!currentUser.phone){

        callBtn.classList.add("opacity-40");
        waBtn.classList.add("opacity-40");

        return;

    }

    callBtn.onclick=()=>{

        location.href=`tel:${currentUser.phone}`;

    };

    waBtn.onclick=()=>{

        const clean=currentUser.phone.replace("-","");

        window.open(
            `https://wa.me/972${clean.substring(1)}`,
            "_blank"
        );

    };

}

</script>

<div id="upcomingBar"
    class="sticky top-[82px] z-30 mx-4 mt-3 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 text-sm font-bold shadow-xl">

    🚨 טוען אירועים קרובים...

</div>

<script>

function renderUpcomingBar(){

    const bar=document.getElementById("upcomingBar");

    const now=new Date();

    const nextEvents=events.filter(e=>{

        return new Date(`${e.date}T${e.time}`)>=now;

    }).slice(0,3);

    if(!nextEvents.length){

        bar.innerHTML="אין אירועים קרובים השבוע";

        return;

    }

    const first=nextEvents[0];

    bar.innerHTML=
    `🚨 האירוע הקרוב: בת מצווה ל${first.girlName} • ${first.date} • ${first.time}`;

}

</script>

<!-- =========================
מסך הודעות
========================= -->

<div id="messagesScreen"
    class="hidden p-4 space-y-4">

    <div class="glass rounded-[30px] p-5">

        <div class="flex justify-between items-center mb-4">

            <h3 class="font-black text-lg">
                הודעות חשובות
            </h3>

        </div>

        <textarea
            id="messageInput"
            class="w-full rounded-2xl bg-white/10 border border-white/10 p-4 min-h-[120px] outline-none"
            placeholder="כתוב הודעה לכל ההורים..."></textarea>

        <button
            onclick="publishMessage()"
            class="w-full mt-3 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 font-black">

            פרסם הודעה

        </button>

    </div>

    <div id="messagesContainer"
        class="space-y-3"></div>

</div>

<script>

let messages=
JSON.parse(localStorage.getItem("bm_messages")) || [];

function publishMessage(){

    const input=document.getElementById("messageInput");

    if(!input.value.trim()) return;

    messages.unshift({

        id:crypto.randomUUID(),

        name:currentUser.parentName,

        text:input.value,

        createdAt:new Date().toLocaleString("he-IL")

    });

    localStorage.setItem(
        "bm_messages",
        JSON.stringify(messages)
    );

    input.value="";

    renderMessages();

}

function renderMessages(){

    const container=
    document.getElementById("messagesContainer");

    container.innerHTML="";

    messages.forEach(msg=>{

        container.innerHTML+=`

        <div class="glass rounded-[28px] p-4">

            <div class="flex justify-between items-center mb-2">

                <div class="font-black">
                    ${msg.name}
                </div>

                <div class="text-xs text-white/40">
                    ${msg.createdAt}
                </div>

            </div>

            <div class="text-sm leading-7 text-white/90">
                ${msg.text}
            </div>

        </div>

        `;

    });

}

</script>
