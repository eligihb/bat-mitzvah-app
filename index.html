<!DOCTYPE html>



<html lang="he" dir="rtl">



<head>



    <meta charset="UTF-8">



    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">



    <title>ניהול בת מצווה כיתתית - ו'4</title>



    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">



    <style>



        body {



            max-width: 430px;



            margin: 0 auto;



            background-color: #f9fafb;



            font-size: 16px;



        }



        input, select, button {



            font-size: 16px !important;



        }



        .sticky-alert {



            position: sticky;



            top: 0;



            z-index: 40;



        }



    </style>



</head>



<body class="font-sans text-gray-800 min-h-screen flex flex-col pb-20 relative">







    <div id="authModal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden">



        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl max-h-[90vh] overflow-y-auto">



            <h2 class="text-xl font-bold text-center text-purple-700 mb-6">ברוכים הבאים לכנפי רוח ו'-4! 👋</h2>



            



            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">



                <div>



                    <label class="block text-sm font-medium mb-2">אני ה- :</label>



                    <div class="flex gap-4">



                        <label class="flex items-center gap-2 bg-gray-50 border p-3 rounded-xl flex-1 justify-center cursor-pointer">



                            <input type="radio" name="parentRole" value="אמא" checked class="accent-purple-600">



                            <span>אמא 👩‍🦰</span>



                        </label>



                        <label class="flex items-center gap-2 bg-gray-50 border p-3 rounded-xl flex-1 justify-center cursor-pointer">



                            <input type="radio" name="parentRole" value="אבא" class="accent-purple-600">



                            <span>אבא 👨</span>



                        </label>



                    </div>



                </div>







                <div>



                    <label class="block text-sm font-medium mb-1">שם מלא של ההורה</label>



                    <input type="text" id="parentName" required class="w-full border p-3 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" placeholder="שם פרטי ומשפחה">



                </div>







                <div>



                    <label class="block text-sm font-medium mb-1">שם הילדה החוגגת</label>



                    



                    <div class="relative mb-1">



                        <input type="text" id="girlName1" required readonly onclick="unlockField('girlName1')"



                            class="w-full border p-3 rounded-xl bg-gray-100 text-gray-500 cursor-pointer pr-10 focus:bg-white focus:text-gray-800 outline-none transition-all" 



                            placeholder="שם פרטי בלבד">



                        <span class="absolute left-3 top-3.5 text-gray-400 text-xs" id="lockIcon1"><i class="fa-solid fa-lock"></i></span>



                    </div>







                    <div class="flex justify-start items-center gap-1.5 mb-3 mt-0.5 px-1">



                        <span class="text-xs text-gray-400">יש תאומות בכיתה?</span>



                        <button type="button" id="twinBtn" onclick="toggleTwinField()" class="text-xs text-purple-600 font-bold hover:underline">



                            <i class="fa-solid fa-pen"></i> הוספה/עריכה



                        </button>



                    </div>







                    <div id="twinContainer" class="relative hidden mb-3">



                        <label class="block text-xs font-medium text-gray-500 mb-1">שם התאומה השנייה</label>



                        <div class="relative">



                            <input type="text" id="girlName2" readonly onclick="unlockField('girlName2')"



                                class="w-full border p-3 rounded-xl bg-gray-100 text-gray-500 cursor-pointer pr-10 focus:bg-white focus:text-gray-800 outline-none transition-all" 



                                placeholder="שם פרטי בלבד">



                            <span class="absolute left-3 top-3.5 text-gray-400 text-xs" id="lockIcon2"><i class="fa-solid fa-lock"></i></span>



                        </div>



                    </div>



                </div>







                <div>



                    <label class="block text-sm font-medium mb-1">מספר טלפון נייד</label>



                    <div class="flex gap-1.5 items-center" dir="ltr">



                        <select id="phonePrefix" class="border p-3 rounded-xl bg-gray-50 outline-none shrink-0 h-[50px]">



                            <option value="050">050</option>



                            <option value="052">052</option>



                            <option value="053">053</option>



                            <option value="054">054</option>



                            <option value="055">055</option>



                            <option value="058">058</option>



                        </select>



                        



                        <span class="text-gray-400 font-bold shrink-0">-</span>



                        



                        <div class="flex gap-1 w-full justify-between">



                            <input type="tel" maxlength="1" pattern="[0-9]" class="phone-cell w-full h-[50px] border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none" oninput="moveNext(this, 1)" onkeydown="moveBack(this, event, 1)">



                            <input type="tel" maxlength="1" pattern="[0-9]" class="phone-cell w-full h-[50px] border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none" oninput="moveNext(this, 2)" onkeydown="moveBack(this, event, 2)">



                            <input type="tel" maxlength="1" pattern="[0-9]" class="phone-cell w-full h-[50px] border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none" oninput="moveNext(this, 3)" onkeydown="moveBack(this, event, 3)">



                            <input type="tel" maxlength="1" pattern="[0-9]" class="phone-cell w-full h-[50px] border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none" oninput="moveNext(this, 4)" onkeydown="moveBack(this, event, 4)">



                            <input type="tel" maxlength="1" pattern="[0-9]" class="phone-cell w-full h-[50px] border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none" oninput="moveNext(this, 5)" onkeydown="moveBack(this, event, 5)">



                            <input type="tel" maxlength="1" pattern="[0-9]" class="phone-cell w-full h-[50px] border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none" oninput="moveNext(this, 6)" onkeydown="moveBack(this, event, 6)">



                            <input type="tel" maxlength="1" pattern="[0-9]" class="phone-cell w-full h-[50px] border rounded-xl text-center font-bold bg-gray-50 focus:bg-white focus:ring-2 focus:ring-purple-500 outline-none" oninput="moveNext(this, 7)" onkeydown="moveBack(this, event, 7)">



                        </div>



                    </div>



                    <p class="text-[11px] text-gray-400 mt-2"><i class="fa-solid fa-circle-info"></i> לחצו על שדה השם כדי לערוך אותו.</p>



                </div>







                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold p-3 rounded-xl transition-all shadow-md mt-2">



                    אישור וכניסה למערכת 🎉



                </button>



            </form>



        </div>



    </div>







    <div id="stickyAlert" class="sticky-alert bg-gradient-to-r from-pink-500 to-purple-600 text-white text-xs py-2.5 px-4 text-center font-bold shadow-md flex justify-between items-center hidden">



        <span class="w-full text-center" id="stickyAlertText">טוען את האירוע הקרוב ביותר... ⏳</span>



    </div>







    <header class="bg-white p-4 shadow-sm border-b border-gray-100 flex justify-between items-center">



        <div>



            <div class="flex items-center gap-2">



                <h1 id="headerParentName" class="font-extrabold text-lg text-gray-900 leading-tight">שלום, הורה</h1>



                <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline flex items-center gap-1 bg-red-50 px-2 py-0.5 rounded-md" title="החלף משתמש">



                    <i class="fa-solid fa-door-open"></i> התנתקות



                </button>



            </div>



            <p id="headerSubDetails" class="text-xs text-gray-500 font-medium mt-1 italic">(טוען פרטים...)</p>



        </div>



        



        <div id="phoneActions" class="flex gap-1.5">



            <button onclick="callParent()" id="btnCall" class="p-2.5 bg-gray-100 text-gray-400 rounded-xl text-sm transition-all" title="חיוג מהיר">



                <i class="fa-solid fa-phone"></i>



            </button>



            <button onclick="whatsappParent()" id="btnWhatsapp" class="p-2.5 bg-gray-100 text-gray-400 rounded-xl text-sm transition-all" title="שלח וואטסאפ">



                <i class="fa-brands fa-whatsapp text-base"></i>



            </button>



        </div>



    </header>







    <main class="flex-1 p-4 overflow-y-auto relative">



        



        <div id="tabFeed" class="space-y-4 tab-content">



            <div class="text-center text-gray-400 py-10">



                <i class="fa-solid fa-circle-notch animate-spin text-2xl mb-2 text-purple-500"></i>



                <p class="text-sm">טוען אירועים מהענן...</p>



            </div>



        </div>







        <div id="tabGantt" class="space-y-4 tab-content hidden">



            <h3 class="font-bold text-gray-700 text-sm border-b pb-2"><i class="fa-solid fa-calendar-days text-purple-500 mr-1"></i> מפת תאריכים כיתתית</h3>



            <div id="ganttContainer" class="grid grid-cols-1 gap-4"></div>



        </div>







        <div id="tabAdd" class="tab-content hidden bg-white p-5 rounded-2xl shadow-sm border border-gray-100">



            <h3 class="font-bold text-lg text-purple-700 mb-4"><i class="fa-solid fa-calendar-plus mr-1"></i> פרסום אירוע חדש בלוח</h3>



            



            <form id="addEventForm" onsubmit="createNewEvent(event)" class="space-y-4">



                <div>



                    <label class="block text-xs font-bold text-gray-600 mb-1">שם ילדת בת המצווה</label>



                    <div id="girlNameSelectionContainer"></div>



                </div>







                <div class="grid grid-cols-2 gap-2">



                    <div>



                        <label class="block text-xs font-bold text-gray-600 mb-1">תאריך האירוע</label>



                        <input type="date" id="eventDate" required oninput="validateForm()" class="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">



                    </div>



                    <div>



                        <label class="block text-xs font-bold text-gray-600 mb-1">שעה</label>



                        <input type="time" id="eventTime" required oninput="validateForm()" class="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-purple-500">



                    </div>



                </div>







                <div>



                    <label class="block text-xs font-bold text-gray-600 mb-1">שם המועדון / אולם</label>



                    <input type="text" id="eventLocation" list="locationsDatalist" required oninput="handleLocationInput(); validateForm();" class="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-purple-500" placeholder="לדוגמה: אולם השמחות">



                    <datalist id="locationsDatalist"></datalist>



                </div>







                <div>



                    <label class="block text-xs font-bold text-gray-600 mb-1">כתובת מלאה (לניווט ב-Waze)</label>



                    <input type="text" id="eventAddress" required oninput="validateForm()" class="w-full border p-2.5 rounded-xl outline-none focus:ring-2 focus:ring-purple-500" placeholder="רחוב, עיר">



                </div>







                <div>



                    <label class="block text-xs font-bold text-gray-600 mb-1">תפריט הגשה</label>



                    <select id="eventMenu" required onchange="validateForm()" class="w-full border p-2.5 rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-purple-500">



                        <option value="">בחר תפריט...</option>



                        <option value="חלבי 🥛">חלבי 🥛</option>



                        <option value="בשרי 🥩">בשרי 🥩</option>



                    </select>



                </div>







                <button type="submit" id="submitEventBtn" disabled class="w-full bg-gray-300 text-gray-500 font-bold p-3 rounded-xl transition-all cursor-not-allowed shadow-sm">



                    מלאו את כל שדות החובה לפרסום



                </button>



            </form>



        </div>







        <button id="floatingAddBtn" onclick="switchTab('add')" class="fixed bottom-20 left-6 bg-purple-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-xl font-bold transition-all hover:bg-purple-700 active:scale-95 z-40 hidden">



            <i class="fa-solid fa-plus"></i>



        </button>



    </main>







    <nav class="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-white border-t border-gray-200 h-16 flex shadow-lg z-40">



        <button onclick="switchTab('feed')" id="nav-feed" class="flex-1 flex flex-col items-center justify-center text-purple-600 font-bold gap-0.5">



            <i class="fa-solid fa-list-ul text-lg"></i>



            <span class="text-[11px]">לוח אירועים</span>



        </button>



        <button onclick="switchTab('gantt')" id="nav-gantt" class="flex-1 flex flex-col items-center justify-center text-gray-400 gap-0.5">



            <i class="fa-solid fa-calendar-days text-lg"></i>



            <span class="text-[11px]">ריכוז חודשי</span>



        </button>



        <button onclick="switchTab('add')" id="nav-add" class="flex-1 flex flex-col items-center justify-center text-gray-400 gap-0.5">



            <i class="fa-solid fa-calendar-plus text-lg"></i>



            <span class="text-[11px]">הוספת אירוע</span>



        </button>



    </nav>







    <script type="module">



        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";



        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";







        // TODO: הדבק כאן את כתובת ה-Firebase Realtime Database שלך



        const firebaseConfig = {



            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com/"



        };







        const app = initializeApp(firebaseConfig);



        const db = getDatabase(app);







        let currentUser = null;



        let allEvents = [];







        window.addEventListener('DOMContentLoaded', () => {



            checkAuth();



            listenToEvents();



        });







        // פונקציות ניווט בין קוביות הטלפון



        window.moveNext = function(current, index) {



            if(current.value.length === 1 && index < 7) {



                const cells = document.querySelectorAll('.phone-cell');



                cells[index].focus();



            }



        }







        window.moveBack = function(current, event, index) {



            if(event.key === "Backspace" && current.value.length === 0 && index > 1) {



                const cells = document.querySelectorAll('.phone-cell');



                cells[index - 2].focus();



            }



        }







        // ניהול תאומות ונעילת שדות



        window.toggleTwinField = function() {



            const container = document.getElementById('twinContainer');



            const btn = document.getElementById('twinBtn');



            const input2 = document.getElementById('girlName2');



            



            if(container.classList.contains('hidden')) {



                container.classList.remove('hidden');



                input2.required = true;



                unlockField('girlName2');



                btn.innerHTML = `<i class="fa-solid fa-minus mr-1"></i> בטל תאומה`;



            } else {



                container.classList.add('hidden');



                input2.required = false;



                input2.value = "";



                btn.innerHTML = `<i class="fa-solid fa-pen mr-1"></i> הוספה/עריכה`;



            }



        }







        window.unlockField = function(fieldId) {



            const input = document.getElementById(fieldId);



            const lockIcon = document.getElementById(fieldId === 'girlName1' ? 'lockIcon1' : 'lockIcon2');



            



            if(input.hasAttribute('readonly')) {



                input.removeAttribute('readonly');



                input.classList.remove('bg-gray-100', 'text-gray-500', 'cursor-pointer');



                input.classList.add('bg-white', 'text-gray-800');



                if(lockIcon) lockIcon.innerHTML = `<i class="fa-solid fa-lock-open text-purple-500"></i>`;



                input.focus();



            }



        }







        // זיהוי ורישום משתמש



        window.handleAuth = function(event) {



            event.preventDefault();



            



            const parentRole = document.querySelector('input[name="parentRole"]:checked').value;



            const parentName = document.getElementById('parentName').value.trim();



            const g1 = document.getElementById('girlName1').value.trim();



            const g2 = document.getElementById('girlName2').value.trim();



            const prefix = document.getElementById('phonePrefix').value;



            



            // איסוף מ-7 הקוביות



            const cells = document.querySelectorAll('.phone-cell');



            let mainNum = "";



            cells.forEach(cell => mainNum += cell.value);







            if(!g1) return alert("חובה למלא שם של ילדה אחת לפחות");



            if(mainNum.length < 7) return alert("חובה למלא את מספר הטלפון המלא בקוביות המיועדות לכך");







            const girlNames = [g1];



            if(g2 && !document.getElementById('twinContainer').classList.contains('hidden')) {



                girlNames.push(g2);



            }







            const phone = `${prefix}-${mainNum}`;







            currentUser = { parentRole, parentName, girlNames, phone };



            localStorage.setItem('batMitzvahUser', JSON.stringify(currentUser));



            



            document.getElementById('authModal').classList.add('hidden');



            renderHeader();



            renderAddEventFormFields();



            renderFeed();



            renderGantt();



        }







        function checkAuth() {



            const stored = localStorage.getItem('batMitzvahUser');



            if (stored) {



                currentUser = JSON.parse(stored);



                renderHeader();



                renderAddEventFormFields();



            } else {



                document.getElementById('authModal').classList.remove('hidden');



                document.getElementById('girlName1').setAttribute('readonly', 'true');



            }



        }







        window.logout = function() {



            if(confirm("האם ברצונך להתנתק מהמערכת?")) {



                localStorage.removeItem('batMitzvahUser');



                currentUser = null;



                location.reload();



            }



        }







        // רינדור רכיבי ממשק עליון



        function renderHeader() {



            if(!currentUser) return;



            document.getElementById('headerParentName').innerText = `שלום, ${currentUser.parentName}`;



            



            const girlsText = currentUser.girlNames.join(' ושל ');



            document.getElementById('headerSubDetails').innerText = `(${currentUser.parentRole} של ${girlsText})`;







            if(currentUser.phone) {



                document.getElementById('btnCall').className = "p-2.5 bg-green-100 text-green-600 rounded-xl text-sm hover:bg-green-200 transition-all";



                document.getElementById('btnWhatsapp').className = "p-2.5 bg-emerald-100 text-emerald-600 rounded-xl text-sm hover:bg-emerald-200 transition-all";



            } else {



                document.getElementById('btnCall').className = "p-2.5 bg-gray-100 text-gray-400 rounded-xl text-sm cursor-not-allowed";



                document.getElementById('btnWhatsapp').className = "p-2.5 bg-gray-100 text-gray-400 rounded-xl text-sm cursor-not-allowed";



            }



        }







        window.callParent = function() { if(currentUser && currentUser.phone) window.location.href = `tel:${currentUser.phone}`; }



        window.whatsappParent = function() {



            if(currentUser && currentUser.phone) {



                const clearPhone = currentUser.phone.replace('-', '');



                window.open(`https://wa.me/972${clearPhone.substring(1)}`, '_blank');



            }



        }







        function renderAddEventFormFields() {



            const container = document.getElementById('girlNameSelectionContainer');



            if(!currentUser) return;







            if(currentUser.girlNames.length === 1) {



                container.innerHTML = `<input type="text" id="eventGirlName" value="${currentUser.girlNames[0]}" readonly class="w-full border p-2.5 rounded-xl bg-gray-100 text-gray-500 font-bold outline-none">`;



            } else {



                let options = currentUser.girlNames.map(name => `<option value="${name}">${name}</option>`).join('');



                container.innerHTML = `<select id="eventGirlName" class="w-full border p-2.5 rounded-xl bg-white font-bold outline-none focus:ring-2 focus:ring-purple-500">${options}</select>`;



            }



        }







        // מעבר טאבים וניהול כפתור פלוס



        window.switchTab = function(tabName) {



            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));



            document.getElementById(`tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.remove('hidden');



            



            ['feed', 'gantt', 'add'].forEach(t => {



                const btn = document.getElementById(`nav-${t}`);



                if(t === tabName) {



                    btn.classList.add('text-purple-600', 'font-bold');



                    btn.classList.remove('text-gray-400');



                } else {



                    btn.classList.remove('text-purple-600', 'font-bold');



                    btn.classList.add('text-gray-400');



                }



            });







            manageFloatingButtonVisibility(tabName);



        }







        function manageFloatingButtonVisibility(currentTab) {



            const floatBtn = document.getElementById('floatingAddBtn');



            if(!currentUser) return;







            const hasPublished = allEvents.some(e => currentUser.girlNames.includes(e.girlName));



            if(currentTab === 'feed' && !hasPublished) {



                floatBtn.classList.remove('hidden');



            } else {



                floatBtn.classList.add('hidden');



            }



        }







        function listenToEvents() {



            const eventsRef = ref(db, 'events');



            onValue(eventsRef, (snapshot) => {



                const data = snapshot.val();



                allEvents = [];



                if (data) {



                    for (let id in data) {



                        allEvents.push({ id, ...data[id] });



                    }



                }



                allEvents.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));



                



                updateStickyAlert();



                renderFeed();



                renderGantt();



                updateDatalist();



                



                const activeTab = document.getElementById('tabFeed').classList.contains('hidden') ? (document.getElementById('tabGantt').classList.contains('hidden') ? 'add' : 'gantt') : 'feed';



                manageFloatingButtonVisibility(activeTab);



            });



        }







        function updateStickyAlert() {



            const now = new Date();



            const upcoming = allEvents.find(e => new Date(`${e.date}T${e.time}`) >= now);



            const alertEl = document.getElementById('stickyAlert');



            



            if(upcoming) {



                const [year, month, day] = upcoming.date.split('-');



                document.getElementById('stickyAlertText').innerText = `🚨 האירוע הקרוב: של ${upcoming.girlName} ב-${day}/${month} בשעה ${upcoming.time}`;



                alertEl.classList.remove('hidden');



            } else {



                alertEl.classList.add('hidden');



            }



        }







        // מסך א': לוח אירועים (פיד)



        function renderFeed() {



            const container = document.getElementById('tabFeed');



            if(!currentUser) return;



            if(allEvents.length === 0) {



                container.innerHTML = `<div class="text-center text-gray-400 py-12"><i class="fa-solid fa-calendar-xmark text-4xl mb-2"></i><p>אין עדיין אירועים בלוח הכיתתי.</p></div>`;



                return;



            }







            const now = new Date();



            container.innerHTML = "";







            allEvents.forEach(event => {



                const eventDateTime = new Date(`${event.date}T${event.time}`);



                const isPast = eventDateTime < now;



                const isOwnEvent = currentUser.girlNames.includes(event.girlName);



                



                const totalAttendees = event.attendees ? Object.keys(event.attendees).length : 0;



                const userKey = `${currentUser.parentName.replace(/[\.\#\$\[\]]/g, "_")}`;



                const userResponse = event.attendees && event.attendees[userKey] ? event.attendees[userKey].status : null;







                const card = document.createElement('div');



                card.id = `card-${event.id}`;



                card.className = `bg-white rounded-2xl p-5 shadow-sm border border-gray-100 relative transition-all ${isPast ? 'opacity-60 bg-gray-50' : ''}`;



                



                let [year, month, day] = event.date.split('-');



                



                let html = `



                    <div class="flex justify-between items-start mb-3">



                        <div>



                            <span class="bg-purple-100 text-purple-700 font-extrabold text-xs px-2.5 py-1 rounded-full">בת מצווה ל${event.girlName} ✨</span>



                            <div class="flex items-center gap-2 mt-2 text-gray-500 text-xs">



                                <span><i class="fa-solid fa-calendar text-purple-400"></i> ${day}/${month}/${year}</span>



                                <span><i class="fa-solid fa-clock text-purple-400"></i> ${event.time}</span>



                            </div>



                        </div>



                        <span class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded-lg">${event.menu}</span>



                    </div>







                    <div class="bg-gray-50 p-3 rounded-xl space-y-1.5 text-xs mb-4">



                        <p><strong class="text-gray-700">📍 מקום:</strong> ${event.location}</p>



                        <p><strong class="text-gray-700">🗺️ כתובת:</strong> ${event.address}</p>



                        <button onclick="openWaze('${event.address}')" class="text-blue-600 font-bold hover:underline flex items-center gap-1 mt-1">



                            <i class="fa-brands fa-waze text-sm"></i> ניווט ישיר ל-Waze



                        </button>



                    </div>



                `;







                if(isPast) {



                    html += `<div class="text-center bg-gray-200 text-gray-500 font-bold p-2.5 rounded-xl text-xs">האירוע כבר התקיים</div>`;



                } else if(isOwnEvent) {



                    const isHidden = event.hideAttendees || false;



                    html += `



                        <div class="border-t pt-3 mt-2">



                            <p class="text-xs text-purple-600 font-bold mb-2"><i class="fa-solid fa-star"></i> אירוע של המשפחה שלך!</p>



                            <button onclick="togglePrivacy('${event.id}', ${isHidden})" class="w-full bg-purple-50 hover:bg-purple-100 text-purple-700 text-xs font-bold py-2.5 px-4 rounded-xl transition-all">



                                ${isHidden ? '👁️ להציג רשימת מאשרים לכולם' : '🙈 להסתיר רשימת מאשרים מהכיתה'}



                            </button>



                        </div>



                    `;



                } else {



                    html += `<div class="border-t pt-3" id="voting-zone-${event.id}">`;



                    if(userResponse) {



                        let statusText = userResponse === 'yes' ? '🟩 הגבת שתגיעו' : (userResponse === 'maybe' ? '🟨 הגבת שאולי תגיעו' : '🟥 הגבת שלא תגיעו');



                        html += `



                            <div class="flex justify-between items-center bg-gray-50 p-2 rounded-xl">



                                <span class="text-xs font-bold text-gray-700">${statusText}</span>



                                <button onclick="enableVoteChange('${event.id}')" class="text-xs text-purple-600 font-bold hover:underline"><i class="fa-solid fa-pen-to-square"></i> עריכה</button>



                            </div>



                        `;



                    } else {



                        html += `



                            <p class="text-xs font-bold text-gray-500 mb-2">האם תגיעו?</p>



                            <div class="grid grid-cols-3 gap-2">



                                <button onclick="submitAttendance('${event.id}', 'yes')" class="bg-green-100 hover:bg-green-200 text-green-700 font-bold py-2 rounded-xl text-xs">מגיע 👍</button>



                                <button onclick="submitAttendance('${event.id}', 'maybe')" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-bold py-2 rounded-xl text-xs">אולי 🤔</button>



                                <button onclick="submitAttendance('${event.id}', 'no')" class="bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 rounded-xl text-xs">לא 👎</button>



                            </div>



                        `;



                    }



                    html += `</div>`;



                }







                const showListToClass = !event.hideAttendees;



                if(isOwnEvent || showListToClass) {



                    html += `<div class="mt-4 pt-3 border-t text-xs text-gray-500"><span class="font-bold text-gray-700">אישרו הגעה עד כה: ${totalAttendees}</span></div>`;



                } else {



                    html += `<div class="mt-4 pt-3 border-t text-xs text-gray-400 italic text-center">🔒 פרטי המאשרים חסויים לבקשת המשפחה</div>`;



                }







                card.innerHTML = html;



                container.appendChild(card);



            });



        }







        window.openWaze = function(address) {



            window.open(`https://waze.com/ul?q=${encodeURIComponent(address)}&navigate=yes`, '_blank');



        }







        window.submitAttendance = function(eventId, status) {



            const userKey = `${currentUser.parentName.replace(/[\.\#\$\[\]]/g, "_")}`;



            const attendanceRef = ref(db, `events/${eventId}/attendees/${userKey}`);



            set(attendanceRef, {



                parentName: currentUser.parentName,



                status: status



            });



        }







        window.enableVoteChange = function(eventId) {



            const userKey = `${currentUser.parentName.replace(/[\.\#\$\[\]]/g, "_")}`;



            set(ref(db, `events/${eventId}/attendees/${userKey}`), null);



        }







        window.togglePrivacy = function(eventId, currentStatus) {



            update(ref(db, `events/${eventId}`), { hideAttendees: !currentStatus });



        }







        // מסך ב': ריכוז חודשי



        function renderGantt() {



            const container = document.getElementById('ganttContainer');



            if(!currentUser || allEvents.length === 0) return;







            const groups = {};



            const monthsNames = ["ינואר", "פברואר", "מרץ", "אפריל", "מאי", "יוני", "יולי", "אוגוסט", "ספטמבר", "אוקטובר", "נובמבר", "דצמבר"];



            



            allEvents.forEach(event => {



                const [year, month] = event.date.split('-');



                const key = `${monthsNames[parseInt(month)-1]} ${year}`;



                if(!groups[key]) groups[key] = [];



                groups[key].push(event);



            });







            container.innerHTML = "";



            const now = new Date();







            for (let monthYear in groups) {



                const monthSection = document.createElement('div');



                monthSection.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-2";



                monthSection.innerHTML = `<h4 class="text-xs font-extrabold text-purple-700 bg-purple-50 px-3 py-1 rounded-lg inline-block mb-1">${monthYear}</h4>`;



                



                groups[monthYear].forEach(event => {



                    const eventDateTime = new Date(`${event.date}T${event.time}`);



                    const isPast = eventDateTime < now;



                    const isOwnEvent = currentUser.girlNames.includes(event.girlName);



                    



                    const userKey = `${currentUser.parentName.replace(/[\.\#\$\[\]]/g, "_")}`;



                    const hasConfirmed = event.attendees && event.attendees[userKey] && event.attendees[userKey].status === 'yes';







                    const [y, m, day] = event.date.split('-');



                    



                    const row = document.createElement('button');



                    row.onclick = () => scrollToCard(event.id);



                    



                    let bgStyle = isOwnEvent ? 'bg-purple-50 border-purple-200 ring-1 ring-purple-300' : 'bg-gray-50 border-gray-100';



                    row.className = `w-full text-right flex items-center justify-between p-3 border rounded-xl hover:bg-gray-100 transition-all text-xs active:scale-[0.99] gap-2 ${bgStyle}`;



                    



                    let innerHTML = `



                        <div class="flex items-center gap-2.5 min-w-0 flex-1">



                            <span class="font-black text-purple-600 bg-white shadow-xs w-7 h-7 flex items-center justify-center rounded-lg border border-gray-100 shrink-0">${day}</span>



                            <span class="break-words font-medium text-gray-800 leading-normal flex-1 min-w-0 ${isPast ? 'line-through text-gray-400' : ''}">



                                ${isOwnEvent ? '⭐ ' : '' }בת מצווה ל${event.girlName} <span class="text-gray-400 font-normal text-[11px] block">${event.location}</span>



                            </span>



                        </div>



                    `;







                    if(isOwnEvent) {



                        innerHTML += `<span class="bg-purple-600 text-white text-[10px] px-2 py-0.5 rounded-md font-bold shrink-0">שלנו! 🎉</span>`;



                    } else if(hasConfirmed && !isPast) {



                        innerHTML += `<span class="bg-green-100 text-green-700 text-[10px] px-1.5 py-0.5 rounded-md font-bold shrink-0">אישרת ✔️</span>`;



                    }







                    row.innerHTML = innerHTML;



                    monthSection.appendChild(row);



                });







                container.appendChild(monthSection);



            }



        }







        function scrollToCard(eventId) {



            switchTab('feed');



            setTimeout(() => {



                const card = document.getElementById(`card-${eventId}`);



                if(card) {



                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });



                    card.classList.add('ring-4', 'ring-purple-400');



                    setTimeout(() => card.classList.remove('ring-4', 'ring-purple-400'), 2000);



                }



            }, 150);



        }







        // מסך ג': הוספת אירוע



        window.handleLocationInput = function() {



            const currentVal = document.getElementById('eventLocation').value;



            const match = allEvents.find(e => e.location === currentVal);



            if(match) {



                document.getElementById('eventAddress').value = match.address;



            }



        }







        function updateDatalist() {



            const datalist = document.getElementById('locationsDatalist');



            const uniqueLocations = [...new Set(allEvents.map(e => e.location))];



            datalist.innerHTML = uniqueLocations.map(loc => `<option value="${loc}">`).join('');



        }







        window.validateForm = function() {



            const date = document.getElementById('eventDate').value;



            const time = document.getElementById('eventTime').value;



            const location = document.getElementById('eventLocation').value;



            const address = document.getElementById('eventAddress').value;



            const menu = document.getElementById('eventMenu').value;



            const btn = document.getElementById('submitEventBtn');







            if(date && time && location && address && menu) {



                btn.removeAttribute('disabled');



                btn.className = "w-full bg-purple-600 hover:bg-purple-700 text-white font-bold p-3 rounded-xl transition-all shadow-md cursor-pointer";



                btn.innerText = "פרסום בלוח הכיתתי 🚀";



            } else {



                btn.setAttribute('disabled', 'true');



                btn.className = "w-full bg-gray-300 text-gray-500 font-bold p-3 rounded-xl transition-all cursor-not-allowed shadow-sm";



                btn.innerText = "מלאו את כל שדות החובה לפרסום";



            }



        }







        window.createNewEvent = function(event) {



            event.preventDefault();



            



            const girlName = document.getElementById('eventGirlName').value;



            const date = document.getElementById('eventDate').value;



            const time = document.getElementById('eventTime').value;



            const location = document.getElementById('eventLocation').value;



            const address = document.getElementById('eventAddress').value;



            const menu = document.getElementById('eventMenu').value;







            const alreadyHasEvent = allEvents.some(e => e.girlName === girlName);



            if(alreadyHasEvent) {



                alert(`⚠️ שים לב: כבר קיים בלוח אירוע רשום על שם ${girlName}. לא ניתן לפרסם אירוע נוסף.`);



                return;



            }







            const dateCollision = allEvents.find(e => e.date === date);



            if(dateCollision) {



                const proceed = confirm(`🚨 התרעת התנגשות! בתאריך שנבחר כבר מתקיים אירוע של ${dateCollision.girlName}.\nהאם אתה בטוח שברצונך להמשיך ולרשום אירוע נוסף באותו היום?`);



                if(!proceed) return;



            }







            const newEventRef = push(ref(db, 'events'));



            set(newEventRef, {



                girlName, date, time, location, address, menu,



                hideAttendees: false



            }).then(() => {



                alert("האירוע פורסם בהצלחה בלוח הכיתתי! 🎉");



                document.getElementById('addEventForm').reset();



                validateForm();



                switchTab('feed');



            }).catch(err => alert("שגיאה בשמירה בענן: " + err.message));



        }



    </script>



</body>
