<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ישומון אירועי בת מצווה</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- התחברות -->
  <div id="loginScreen" class="min-h-screen flex items-start justify-center pt-10 pb-4 px-4 relative">
    <div class="login-bg"></div>

    <div class="glass rounded-[34px] p-5 w-full max-w-sm relative z-10">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-black mb-2 leading-tight">ברוכים הבאים לישומון אירועי בת מצווה</h1>
        <div class="text-purple-200 text-sm">כנפי רוח ו׳-4 • תשפ״ו</div>
      </div>

      <form id="loginForm" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <button type="button" class="roleBtn bg-purple-600 rounded-2xl p-3 font-bold" data-role="אמא">אמא 👩</button>
          <button type="button" class="roleBtn bg-white/10 rounded-2xl p-3 font-bold" data-role="אבא">אבא 👨</button>
        </div>

        <div>
          <label class="block text-sm font-bold mb-1">שם ההורה *</label>
          <input id="parentName" class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none" placeholder="שם מלא" />
        </div>

        <div>
          <label class="block text-sm font-bold mb-1">שם הילדה *</label>
          <input id="girlName" class="w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none" placeholder="שם פרטי" />
        </div>

        <div>
          <button type="button" id="toggleTwin" class="text-sm text-purple-300 font-bold">+ תאומה נוספת</button>
          <input id="twinName" class="hidden w-full rounded-2xl bg-white/10 border border-white/10 p-3 outline-none mt-3" placeholder="שם התאומה" />
        </div>

        <div>
          <label class="block text-sm font-bold mb-1">
            טלפון <span class="text-gray-400 text-xs">(לא חובה)</span>
          </label>
          <div class="flex items-center gap-2" dir="ltr">
            <select id="phonePrefix" class="h-12 px-2 rounded-2xl bg-white/10 border border-white/10 text-white outline-none">
              <option>051</option>
              <option>052</option>
              <option>053</option>
              <option>054</option>
              <option>055</option>
              <option>056</option>
              <option>057</option>
              <option>058</option>
              <option>059</option>
            </select>
            <span class="text-white/40 font-black">-</span>
            <div class="flex gap-1">
              <input maxlength="1" class="phoneCell" inputmode="numeric" />
              <input maxlength="1" class="phoneCell" inputmode="numeric" />
              <input maxlength="1" class="phoneCell" inputmode="numeric" />
              <input maxlength="1" class="phoneCell" inputmode="numeric" />
              <input maxlength="1" class="phoneCell" inputmode="numeric" />
              <input maxlength="1" class="phoneCell" inputmode="numeric" />
              <input maxlength="1" class="phoneCell" inputmode="numeric" />
            </div>
          </div>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-3 font-black shadow-xl">
          כניסה לישומון
        </button>
      </form>
    </div>
  </div>

  <!-- אפליקציה -->
  <div id="appScreen" class="hidden pb-28">
    <header class="sticky top-0 z-50 bg-black/40 backdrop-blur-xl border-b border-white/5">
      <div class="p-4">
        <div class="flex items-center gap-2 flex-wrap">
          <h2 id="headerName" class="font-black text-lg"></h2>
          <button id="callBtn" type="button" class="w-8 h-8 rounded-full bg-white/10 text-white/40 flex items-center justify-center" aria-label="התקשרות">
            <i class="fa-solid fa-phone"></i>
          </button>
          <button id="waBtn" type="button" class="w-8 h-8 rounded-full bg-white/10 text-white/40 flex items-center justify-center" aria-label="וואטסאפ">
            <i class="fa-brands fa-whatsapp"></i>
          </button>
          <button id="logoutBtn" type="button" class="text-xs text-red-300">התנתקות</button>
        </div>
        <div class="flex items-center gap-2 mt-1">
          <div id="headerRole" class="text-sm text-purple-200"></div>
          <button id="switchRoleBtn" type="button" class="text-xs text-white/50" aria-label="החלפת תפקיד">
            <i class="fa-solid fa-pen"></i>
          </button>
        </div>
      </div>
    </header>

    <div id="upcomingBar" class="mx-4 mt-4 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 text-sm font-bold shadow-xl"></div>

    <div id="eventsTab" class="tab active p-4 space-y-4"></div>
    <div id="calendarTab" class="tab p-4"></div>

    <div id="messagesTab" class="tab p-4 space-y-4">
      <div class="glass rounded-[28px] p-4">
        <textarea id="messageInput" class="w-full bg-white/10 rounded-2xl p-4 outline-none min-h-[120px]" placeholder="כתוב הודעה לכל ההורים..."></textarea>
        <button id="publishMessageBtn" type="button" class="w-full mt-3 rounded-2xl bg-gradient-to-r from-pink-500 to-purple-600 p-3 font-black">
          פרסם הודעה
        </button>
      </div>
      <div id="messagesContainer" class="space-y-3"></div>
    </div>
  </div>

  <button id="addBtn" type="button" class="hidden fixed bottom-24 left-6 z-50 w-16 h-16 rounded-full bg-gradient-to-r from-pink-500 to-purple-600 shadow-2xl text-3xl font-black" aria-label="הוספת אירוע">+</button>

  <!-- מודל אירוע -->
  <div id="eventModal" class="hidden fixed inset-0 bg-black/70 z-50 items-center justify-center p-4">
    <div class="glass rounded-[34px] p-5 w-full max-w-sm">
      <div class="flex justify-between items-center mb-5">
        <h3 class="font-black text-lg">הוספת אירוע</h3>
        <button id="closeModal" type="button" aria-label="סגירה">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <form id="eventForm" class="space-y-4">
        <input type="date" id="eventDate" class="w-full rounded-2xl bg-white/10 border border-white/10 p-3" />
        <input type="time" id="eventTime" class="w-full rounded-2xl bg-white/10 border border-white/10 p-3" />
        <input type="text" id="eventLocation" placeholder="מקום האירוע" class="w-full rounded-2xl bg-white/10 border border-white/10 p-3" />
        <input type="text" id="eventAddress" placeholder="כתובת" class="w-full rounded-2xl bg-white/10 border border-white/10 p-3" />

        <select id="eventMenu" class="w-full rounded-2xl bg-white/10 border border-white/10 p-3">
          <option value="">בחר תפריט</option>
          <option value="חלבי 🥛">חלבי 🥛</option>
          <option value="בשרי 🥩">בשרי 🥩</option>
        </select>

        <input type="file" id="girlImage" accept="image/*" />

        <div class="flex items-center gap-3">
          <button type="button" id="privacyBtn" class="w-11 h-11 rounded-full bg-white/10 flex items-center justify-center" aria-label="הסתרת אורחים">
            <i class="fa-solid fa-eye-slash"></i>
          </button>
          <div id="privacyText" class="hidden text-xs text-white/60 leading-5">
            המשתמשים לא יוכלו לראות את אישורי ההגעה של האחרים
          </div>
        </div>

        <div id="shabbatWarning" class="hidden text-red-300 bg-red-500/10 border border-red-500/30 rounded-2xl p-3 text-sm">
          לא ניתן לקבוע אירוע בזמן שבת ✨
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl p-3 font-black">
          פרסום אירוע 🚀
        </button>
      </form>
    </div>
  </div>

  <!-- ניווט תחתון -->
  <nav id="bottomNav" class="hidden fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto h-20 bg-black/70 backdrop-blur-2xl border-t border-white/10 flex z-50">
    <button type="button" data-tab="events" class="flex-1 flex flex-col items-center justify-center gap-1 text-pink-300">
      <i class="fa-solid fa-list"></i>
      <span class="text-[11px]">אירועים</span>
    </button>
    <button type="button" data-tab="calendar" class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">
      <i class="fa-solid fa-calendar-days"></i>
      <span class="text-[11px]">לוח שנה</span>
    </button>
    <button type="button" data-tab="messages" class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">
      <i class="fa-solid fa-bell"></i>
      <span class="text-[11px]">הודעות</span>
    </button>
    <button type="button" id="navAdd" class="flex-1 flex flex-col items-center justify-center gap-1 text-white/40">
      <i class="fa-solid fa-plus"></i>
      <span class="text-[11px]">הוסף אירוע</span>
    </button>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
